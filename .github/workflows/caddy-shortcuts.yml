name: caddy-shortcuts

# Daily regen of caddy/sites/*.caddy from sibling repos' config.yml.
# See coilysiren/infrastructure#129 for the design.
#
# Reload on kai-server is manual today:
#   cd ~/projects/coilysiren/infrastructure && git pull
#   sudo caddy reload --config /etc/caddy/Caddyfile
#
# No untrusted-input interpolation. Only ${{ secrets.GITHUB_TOKEN }}, which
# is a vetted secret context per GitHub's own threat model.

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily, staggered from common cron alignment
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: regenerate snippets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/generate-caddy-shortcuts.py

      - name: commit if changed
        # Uses GraphQL createCommitOnBranch so the commit is auto-signed by
        # GitHub's web-flow key. Required because the repo ruleset enforces
        # verified-signed commits. See #144.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if git diff --quiet caddy/sites/; then
            echo "no shortcut changes"
            exit 0
          fi

          additions_json=$(
            git diff --name-only --diff-filter=ACMR -- caddy/sites/ \
              | while IFS= read -r p; do
                  jq -n --arg path "$p" --arg b64 "$(base64 < "$p" | tr -d '\n')" \
                    '{path: $path, contents: $b64}'
                done \
              | jq -cs '.'
          )
          deletions_json=$(
            git diff --name-only --diff-filter=D -- caddy/sites/ \
              | jq -R '{path: .}' \
              | jq -cs '.'
          )

          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg head "$HEAD_SHA" \
            --argjson additions "$additions_json" \
            --argjson deletions "$deletions_json" \
            '{
              branch: {repositoryNameWithOwner: $repo, branchName: $branch},
              message: {headline: "caddy: regenerate tailnet shortcut snippets, refs #129"},
              expectedHeadOid: $head,
              fileChanges: {additions: $additions, deletions: $deletions}
            }' > "$RUNNER_TEMP/commit-input.json"

          gh api graphql \
            -f query='mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url oid } } }' \
            -F "input=@$RUNNER_TEMP/commit-input.json"
