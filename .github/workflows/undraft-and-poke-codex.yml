name: undraft-and-poke-codex

# Codex doesn't review draft PRs and doesn't auto-review when a PR leaves
# draft, so this workflow flips draft PRs to ready-for-review on open and
# explicitly mentions @codex to trigger a review.

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  undraft:
    if: github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    steps:
      - name: Mark ready for review and mention codex
        uses: actions/github-script@v7
        with:
          script: |
            await github.graphql(
              `mutation($id: ID!) {
                 markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                   pullRequest { id }
                 }
               }`,
              { id: context.payload.pull_request.node_id },
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '@codex review',
            });
