name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    # https://github.com/actions/runner-images
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run pylint --disable=fixme $(git ls-files '*.py')
