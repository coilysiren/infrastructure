# Codex may work across the public flight-deck and personal coilysiren trees.
codex_permissions_profile: kai-scoped
codex_permissions_allowed_roots:
  - "{{ ansible_facts.env.HOME }}/projects/coilyco-flight-deck"
  - "{{ ansible_facts.env.HOME }}/projects/coilysiren"
codex_permissions_denied_paths:
  - "{{ ansible_facts.env.HOME }}/projects/coilyco-bridge"
  - "{{ ansible_facts.env.HOME }}/.claude"
  - "{{ ansible_facts.env.HOME }}/.config/agent-compose/COMPOSED.claude.md"
  - "{{ ansible_facts.env.HOME }}/.config/agent-compose/agent-compose.yaml"
