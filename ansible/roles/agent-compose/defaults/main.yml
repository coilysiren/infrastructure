# Defaults for the agent-compose role. The per-host-varying bit (scopes) is set
# in inventory group_vars/host_vars; everything here is fleet-static structure.
#
# agent-compose composes one global context file (COMPOSED.md) from the sources
# below and points each harness's global load point at it by symlink, so Claude
# Code, Codex, and OpenClaw load byte-identical context with nothing duplicated.

# Repo roots on the host. Override per host if a machine's layout differs.
agent_compose_kai_root: "{{ ansible_env.HOME }}/projects/coilyco-bridge/agentic-os-kai"
agent_compose_aos_root: "{{ ansible_env.HOME }}/projects/coilyco-flight-deck/agentic-os"

# Disjoint AGENTS.COMPOSE.md sources, composed in listed order. Explicit (not
# root-walked) for determinism and speed.
agent_compose_sources:
  - "{{ agent_compose_kai_root }}/AGENTS.COMPOSE.md"

# Harness global load points. openclaw is empty => skipped (forgejo #135 deferred
# the OpenClaw global load point); set it to a path to wire a third symlink.
agent_compose_load_points:
  claude: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
  codex: "{{ ansible_env.HOME }}/.codex/AGENTS.md"
  openclaw: ""

# This machine's scope tags. Overridden in group_vars per host class. A source
# composes iff its declared scopes intersect this set.
agent_compose_scopes:
  - kai-private
