# Converge agent-compose: render the per-machine config, then run the composer
# to write COMPOSED.md + harness load-point symlinks. See docs/ansible.md.
- name: Ensure agent-compose config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/agent-compose"
    state: directory
    mode: "0755"

- name: Render the per-machine agent-compose config
  ansible.builtin.template:
    src: agent-compose.yaml.j2
    dest: "{{ ansible_env.HOME }}/.config/agent-compose/agent-compose.yaml"
    mode: "0644"

# Module form + PYTHONPATH (mirrors setup.sh) so it works off-PATH. Check mode
# runs --dry-run and mutates nothing.
- name: Compose COMPOSED.md and converge harness symlinks
  ansible.builtin.command:
    cmd: "python3 -m agentic_os.agent_compose{{ ' --dry-run' if ansible_check_mode else '' }}"
  environment:
    PYTHONPATH: "{{ agent_compose_aos_root }}"
  register: agent_compose_run
  changed_when: >-
    ('linked ' in agent_compose_run.stdout)
    or ('wrote ' in agent_compose_run.stdout)
    or ('would ' in agent_compose_run.stdout)
  check_mode: false
