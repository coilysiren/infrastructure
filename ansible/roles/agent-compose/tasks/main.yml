# Converge agent-compose: render config, run the composer. See docs/ansible.md.
- name: Resolve the work overlay subdir from SSM
  ansible.builtin.command:
    cmd: "coily ops aws ssm get-parameter --name {{ agent_compose_work_subdir_ssm }} --query Parameter.Value --output text"
  register: agent_compose_work_subdir
  changed_when: false
  check_mode: false
  when: agent_compose_work_subdir_ssm | length > 0

- name: Set the work overlay root from the resolved subdir
  ansible.builtin.set_fact:
    agent_compose_work_root: "{{ ansible_env.HOME }}/projects/{{ agent_compose_work_subdir.stdout | trim }}"
  when: agent_compose_work_subdir_ssm | length > 0

- name: Ensure agent-compose config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/agent-compose"
    state: directory
    mode: "0755"

- name: Ensure the host-local doctrine drop-dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ agent_compose_roots }}"

- name: Render the per-machine agent-compose config
  ansible.builtin.template:
    src: agent-compose.yaml.j2
    dest: "{{ ansible_env.HOME }}/.config/agent-compose/agent-compose.yaml"
    mode: "0644"

- name: Compose COMPOSED.md and converge harness symlinks
  ansible.builtin.command:
    cmd: "python3 -m agentic_os.generators.generate_agent_compose{{ ' --dry-run' if ansible_check_mode else '' }}"
  environment:
    PYTHONPATH: "{{ agent_compose_aos_root }}"
  register: agent_compose_run
  changed_when: >-
    ('linked ' in agent_compose_run.stdout)
    or ('wrote ' in agent_compose_run.stdout)
    or ('would ' in agent_compose_run.stdout)
  check_mode: false
