# Converge the keepawake hold on a macOS workstation: install the manager
# script + root LaunchDaemon, then (re)load it on change. Idempotent - the
# templates are check-mode safe and only the reload handler mutates launchd,
# and only when a template changed. Requires become (writes to /usr/local/sbin
# and /Library/LaunchDaemons); the play grants it on the role.
- name: Ensure the manager script directory exists
  ansible.builtin.file:
    path: "{{ keepawake_manager_path | dirname }}"
    state: directory
    mode: "0755"

- name: Install the keepawake manager script
  ansible.builtin.template:
    src: keepawake-manager.sh.j2
    dest: "{{ keepawake_manager_path }}"
    mode: "0755"
  notify: Reload keepawake daemon

- name: Install the keepawake LaunchDaemon
  ansible.builtin.template:
    src: me.coilysiren.keepawake.plist.j2
    dest: "{{ keepawake_plist_path }}"
    mode: "0644"
  notify: Reload keepawake daemon

# Opt-in (keepawake_schedule_wake). `pmset repeat` overwrites a single global
# schedule declaratively, so reasserting it each converge is idempotent in
# effect even though pmset offers no check surface - hence changed_when: false
# rather than a brittle stdout diff against pmset's 12-hour format.
- name: Schedule a pre-window wake so the maintenance hour is reachable
  ansible.builtin.command:
    cmd: "pmset repeat wake MTWRFSU {{ keepawake_wake_time }}"
  when: keepawake_schedule_wake
  changed_when: false
  check_mode: false
