# Defaults for the keepawake role. Holds a macOS workstation awake so remote
# dispatch keeps running after Kai walks away from the desk - power-source-
# agnostic (survives battery AND lid-closed, the only state `pmset disablesleep`
# covers), with two releases so the hold can never do harm:
#   - a nightly maintenance window (default 03:00-03:59 local) so the macOS /
#     ansible software-update + reboot cycle runs clean, then re-asserts, and
#   - a battery floor: on battery below N%, release the hold so an unattended
#     pack can't drain to zero.
# A root LaunchDaemon ticks every keepawake_tick_seconds and reconciles
# `pmset disablesleep` to the desired state. Display sleep is left untouched
# (displaysleep stays whatever the host's power profile sets - it saves battery
# and does not affect dispatch).

keepawake_floor_pct: 30          # on battery below this %, release the hold
keepawake_maint_hour: "03"       # local hour (00-23) released for maintenance
keepawake_tick_seconds: 60       # daemon reconcile interval

# Optional pre-window wake so the box is reachable at the maintenance hour even
# if the battery floor let it sleep overnight. Off by default: `pmset repeat` is
# a single global schedule and enabling it clobbers any other repeat in use.
keepawake_schedule_wake: false
keepawake_wake_time: "02:58:00"

# Fixed install paths (root-owned). Override only if a host's layout differs.
keepawake_label: me.coilysiren.keepawake
keepawake_manager_path: /usr/local/sbin/keepawake-manager.sh
keepawake_plist_path: /Library/LaunchDaemons/me.coilysiren.keepawake.plist
keepawake_log: /var/log/keepawake.log
