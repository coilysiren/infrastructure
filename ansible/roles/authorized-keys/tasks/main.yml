# Authorize GitHub-published SSH keys for a local account; see docs/ansible.md.
- name: Authorize GitHub-published SSH keys for {{ authorized_keys_user }}
  ansible.posix.authorized_key:
    user: "{{ authorized_keys_user }}"
    key: "https://github.com/{{ item }}.keys"
    state: present
    exclusive: "{{ authorized_keys_exclusive }}"
    manage_dir: true
  loop: "{{ authorized_keys_github_users }}"
  become: true
