# Converge ollama service + declared MLX models. See docs/FEATURES.md.
- name: Converge ollama server and models
  when:
    - ollama_models | length > 0
    - not ansible_check_mode
  block:
    - name: Query ollama brew service status
      ansible.builtin.command: brew services info ollama --json
      register: ollama_service_info
      changed_when: false
      failed_when: false

    - name: Ensure ollama brew service is running
      ansible.builtin.command: brew services start ollama
      when: >-
        ollama_service_info.rc != 0
        or (ollama_service_info.stdout | default('') | trim) == ''
        or not ((ollama_service_info.stdout | from_json | first).running | default(false))
      register: ollama_service_start
      changed_when: ollama_service_start.rc == 0

    - name: Wait for the ollama server to accept connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 11434
        timeout: 60

    - name: List models already pulled
      ansible.builtin.command: ollama list
      register: ollama_installed
      changed_when: false

    - name: Pull declared ollama models
      ansible.builtin.command: "ollama pull {{ item }}"
      loop: "{{ ollama_models }}"
      when: item not in ollama_installed.stdout
      register: ollama_pull
      changed_when: ollama_pull.rc == 0

    - name: Read the current ollama server env values from the launchd plist
      ansible.builtin.command:
        cmd: >-
          /usr/libexec/PlistBuddy
          -c "Print :EnvironmentVariables:{{ item.key }}"
          {{ ollama_plist }}
      loop: "{{ ollama_service_env | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      register: ollama_env_current
      changed_when: false
      failed_when: false

    - name: Pin the ollama server env keys in the plist
      ansible.builtin.command:
        cmd: >-
          /usr/libexec/PlistBuddy -c
          "{{ ('Add :EnvironmentVariables:' ~ item.item.key ~ ' string ')
              if item.rc != 0
              else ('Set :EnvironmentVariables:' ~ item.item.key ~ ' ') }}{{ item.item.value }}"
          {{ ollama_plist }}
      loop: "{{ ollama_env_current.results }}"
      loop_control:
        label: "{{ item.item.key }}"
      when: (item.rc != 0) or ((item.stdout | trim) != (item.item.value | string))
      register: ollama_env_pin
      changed_when: ollama_env_pin.rc == 0

    - name: Remove OLLAMA_DEBUG from the plist when disabled
      ansible.builtin.command:
        cmd: >-
          /usr/libexec/PlistBuddy
          -c "Delete :EnvironmentVariables:OLLAMA_DEBUG"
          {{ ollama_plist }}
      when: not (ollama_debug | bool)
      register: ollama_debug_remove
      changed_when: ollama_debug_remove.rc == 0
      failed_when: false

    - name: Reload the ollama launchd service to apply env changes
      ansible.builtin.shell: |
        set -e
        uid=$(id -u)
        launchctl bootout "gui/$uid/homebrew.mxcl.ollama" 2>/dev/null || true
        sleep 1
        launchctl bootstrap "gui/$uid" "{{ ollama_plist }}"
      when: (ollama_env_pin is changed) or (ollama_debug_remove is changed)
      changed_when: true

    - name: Wait for ollama to accept connections after reload
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 11434
        timeout: 60
      when: (ollama_env_pin is changed) or (ollama_debug_remove is changed)
