# Converge Claude Code harness hooks into ~/.claude/settings.json (today: the
# advisory o2r cross-node PreToolUse nudge). See docs/ansible.md.
- name: Ensure the Claude hook script directory exists
  ansible.builtin.file:
    path: "{{ o2r_nudge_dir }}"
    state: directory
    mode: "0755"

- name: Render the o2r cross-node nudge hook script
  ansible.builtin.template:
    src: o2r-nudge.sh.j2
    dest: "{{ o2r_nudge_script }}"
    mode: "0755"

- name: Wire the o2r nudge as a PreToolUse Bash hook
  claude_settings_hook:
    event: PreToolUse
    matcher: Bash
    command: "{{ o2r_nudge_script }}"
    marker: o2r-nudge.sh
    state: present

# Agent self-name (statusLine + SessionStart hook) and session-pulse SessionStart
# hook. Wraps the idempotent agentic-os mergers; --dry-run drives check mode.
- name: Wire the agent self-name into settings.json
  ansible.builtin.command:
    cmd: "python3 {{ claude_hooks_aos_scripts }}/install-agent-name.py{{ ' --dry-run' if ansible_check_mode else '' }}"
  register: claude_hooks_agent_name
  changed_when: "'already wired' not in claude_hooks_agent_name.stdout"
  check_mode: false

- name: Wire the session-pulse SessionStart hook into settings.json
  ansible.builtin.command:
    cmd: "python3 {{ claude_hooks_aos_scripts }}/install-session-pulse.py{{ ' --dry-run' if ansible_check_mode else '' }}"
  register: claude_hooks_session_pulse
  changed_when: "'already wired' not in claude_hooks_session_pulse.stdout"
  check_mode: false
