# Homebrew convergence via community.general modules. Taps are {name, url?};
# private Forgejo taps need an explicit url. check_mode: false rationale in docs.
- name: Ensure Homebrew taps are present
  community.general.homebrew_tap:
    name: "{{ item.name }}"
    url: "{{ item.url | default(omit) }}"
    state: present
  loop: "{{ homebrew_taps }}"
  check_mode: false

- name: Ensure Homebrew formulae are present
  community.general.homebrew:
    name: "{{ homebrew_installed_packages }}"
    state: present
  when: homebrew_installed_packages | length > 0

- name: Ensure Homebrew casks are present
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    # accept_external_apps avoids reinstall churn when an app was first
    # installed outside brew (common for Chrome / Docker Desktop).
    accept_external_apps: true
  loop: "{{ homebrew_cask_apps }}"

# Removal surface: declared-absent formulae/casks are uninstalled, so a tool can
# be retired fleet-wide instead of lingering. Idempotent. See docs/ansible.md.
- name: Ensure Homebrew formulae are absent
  community.general.homebrew:
    name: "{{ homebrew_installed_packages_absent | default([]) }}"
    state: absent
  when: homebrew_installed_packages_absent | default([]) | length > 0

- name: Ensure Homebrew casks are absent
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: absent
  loop: "{{ homebrew_cask_apps_absent | default([]) }}"

# Force hook deps into the brew system python3 (its own pip3, not ansible's
# uv-env python) so `language: system` pre-commit hooks work. Why: docs/ansible.md.
- name: Ensure Homebrew system python3 carries language-system pre-commit hook deps
  ansible.builtin.pip:
    name: "{{ system_python3_packages }}"
    state: present
    executable: /opt/homebrew/bin/pip3
    extra_args: --break-system-packages
  when: system_python3_packages | default([]) | length > 0

# Python CLIs as pipx apps (isolated venvs), backed by the brew `pipx` formula.
# `present` is the idempotent install alias. Why pipx not brew: docs/ansible.md.
- name: Ensure pipx applications are present
  community.general.pipx:
    name: "{{ item }}"
    state: present
  loop: "{{ pipx_packages | default([]) }}"
  when: pipx_packages | default([]) | length > 0
