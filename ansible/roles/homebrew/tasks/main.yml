# Homebrew convergence via community.general modules. Taps are {name, url?};
# private Forgejo taps need an explicit url. See docs/ansible.md.
- name: Ensure Homebrew taps are present
  community.general.homebrew_tap:
    name: "{{ item.name }}"
    url: "{{ item.url | default(omit) }}"
    state: present
  loop: "{{ homebrew_taps }}"

- name: Ensure Homebrew formulae are present
  community.general.homebrew:
    name: "{{ homebrew_installed_packages }}"
    state: present
  when: homebrew_installed_packages | length > 0

- name: Ensure Homebrew casks are present
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    # accept_external_apps avoids reinstall churn when an app was first
    # installed outside brew (common for Chrome / Docker Desktop).
    accept_external_apps: true
  loop: "{{ homebrew_cask_apps }}"

# Force hook deps into the brew system python3 (its own pip3, not ansible's
# uv-env python) so `language: system` pre-commit hooks work. Why: docs/ansible.md.
- name: Ensure Homebrew system python3 carries language-system pre-commit hook deps
  ansible.builtin.pip:
    name: "{{ system_python3_packages }}"
    state: present
    executable: /opt/homebrew/bin/pip3
    extra_args: --break-system-packages
  when: system_python3_packages | default([]) | length > 0
