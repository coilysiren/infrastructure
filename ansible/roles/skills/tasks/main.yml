# Converge the Claude/Codex skill surface via agentic-os-kai's mount-skills.sh.
# Skipped in check mode (no dry-run), no-op without the checkout. See docs/ansible.md.

- name: Stat the skill-mount script
  ansible.builtin.stat:
    path: "{{ skills_mount_script }}"
  register: skills_script_stat

- name: Mount Kai's skill surface (self-mount + repo-pointers + capabilities)
  ansible.builtin.command:
    cmd: "bash {{ skills_mount_script }}"
  register: skills_mount
  changed_when: "'linked' in skills_mount.stdout or 'pulled' in skills_mount.stdout"
  when:
    - skills_script_stat.stat.exists
    - not ansible_check_mode
