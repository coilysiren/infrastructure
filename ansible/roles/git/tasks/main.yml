# Git remote-sync + mirror-drift sweep across every local clone. repo_status
# does the per-repo work; this role renders rows. See docs/ansible.md.

# Linear-history default for interactive pulls; repo_status passes --rebase
# explicitly and never depends on this. Detail in docs/ansible.md (git role).
- name: Default git pull to rebase globally
  community.general.git_config:
    name: pull.rebase
    scope: global
    value: "true"

- name: Sweep local repos (fetch, status, mirror-drift; origin rebase + others ff-only on apply)
  repo_status:
    root: "{{ repos_root }}"
    known_orgs: "{{ repos_known_orgs }}"
    parallel: "{{ git_sweep_parallel }}"
  register: repo_sweep

- name: Report per-repo git status
  ansible.builtin.debug:
    msg: "{{ repo_sweep.summaries }}"

# Surface the blockers here; the play-end freshness gate (freshen.yml post_tasks)
# is what actually fails the run, so the rest of the host still converges first.
- name: Report repos needing manual action (run fails on these at the end)
  ansible.builtin.debug:
    msg: >-
      {{ repo_sweep.action_required | length }} repo(s) need manual action
      (uncommitted/stash/unmerged-branch/in-progress-op/detached/drift/blocked-pull):
      {{ repo_sweep.action_required | join(', ') }}
  when: repo_sweep.action_required | length > 0

# Informational only - a clean push away, never fails the run.
- name: Report repos with local commits to push
  ansible.builtin.debug:
    msg: >-
      {{ repo_sweep.needs_push | length }} repo(s) have unpushed commits on the
      default branch - push when ready: {{ repo_sweep.needs_push | join(', ') }}
  when: repo_sweep.needs_push | length > 0
