# Ansible inventory for the coilysiren fleet.
#
# The `mac` group converges macOS workstations against ansible/playbooks/mac.yml.
# Today it holds only this control host (kais-macbook-pro) over a local
# connection - no SSH, ansible drives the box it runs on. Add more Macs here
# as the fleet grows; each picks up group_vars/mac.yml.
all:
  children:
    mac:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
