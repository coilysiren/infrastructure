# Inventory for the coilysiren fleet. The `mac` group converges macOS hosts.
# `work` is a child class for employer-owned machines: no kai-private overlay,
# plus a work source resolved from SSM. The control host today is a work mac, so
# localhost sits in `work` and inherits `mac` for the Homebrew baseline. A future
# personal mac goes straight under `mac`, not `work`. See docs/ansible.md.
all:
  children:
    mac:
      children:
        work:
          hosts:
            localhost:
              ansible_connection: local
              ansible_python_interpreter: "{{ ansible_playbook_python }}"
