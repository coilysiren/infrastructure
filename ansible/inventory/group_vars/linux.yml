# Declared baseline for the `linux` group (kai-server and any Linux control
# host). agent-compose + repos vars come from the role defaults / all.yml.

# Homebrew on Linux (linuxbrew) is not yet curated; empty lists keep the
# homebrew role a no-op until seeded. Track growth in docs/ansible.md.
homebrew_taps: []
homebrew_installed_packages: []
homebrew_cask_apps: []
homebrew_cask_apps_absent: []
pipx_packages: []

# default-apps is macOS-only (duti); empty bundle id skips the whole role.
default_app_editor_bundle_id: ""
default_app_editor_extensions: []
