# Declared baseline for the `mac` group, seeded by `coily ansible-mac-seed`.
# Additive (never uninstalls); hand-curate after seeding. See docs/ansible.md.

# agent-compose source selection. `mac` = personal machines, so the role
# default (public base + private overlay). A work mac overrides in its group.

# Third-party taps {name, url?}. Private Forgejo taps need an explicit url; the
# bare name resolves to a nonexistent github.com/<user>/homebrew-<repo>.
homebrew_taps:
  - name: coilyco-flight-deck/otel-a2a-relay-cli
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/otel-a2a-relay-cli
  - name: coilyco-flight-deck/repo-recall
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/repo-recall
  - name: coilyco-flight-deck/session-lattice
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/session-lattice
  - name: coilyco-flight-deck/ward
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/ward
  - name: coilyco-bridge/coily
    url: https://forgejo.coilysiren.me/coilyco-bridge/coily
  - name: getsentry/tools
  # homebrew/services dropped: tap deprecated and emptied (merged into core), so
  # tapping errors. `brew services` still works tap-free.
  - name: openhue/cli
  - name: steipete/tap
  - name: terraform-linters/tap

# Top-level formulae (brew leaves), not their dependencies.
