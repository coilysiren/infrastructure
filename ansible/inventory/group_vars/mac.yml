  - asdf
  - ast-grep
  - atuin
  - awscli
  - bat
  - bottom
  - coilyco-flight-deck/otel-a2a-relay-cli/o2r
  # repo-recall skipped: re-pointed upstream tag breaks brew tag-integrity.
  # - coilyco-flight-deck/repo-recall/repo-recall

  # session-lattice-puller skipped: formula depends on the dead pre-migration org path.
  # - coilyco-flight-deck/session-lattice/session-lattice-puller
  - coilyco-flight-deck/ward/ward
  # agent-guard/agent-guard dropped: orphaned keg, tap renamed it to `ward`
  # (#197). `brew uninstall coilysiren/agent-guard/agent-guard` to clear it.
  - coilyco-bridge/coily/coily
  - cryptography
  - diff-pdf
  - direnv
  - dive
  - docker
