# group_vars for the `mac` inventory group. Seeded from the live
# machine by `coily ansible-mac-seed` (scripts/ansible/seed_mac_brew.py).
# Additive: ansible ensures these are present, never uninstalls.
# Curate by hand after seeding - this is the fleet's declared baseline.

# agent-compose source selection for this machine class. The `mac` group is
# personal machines, so they take the role default: the public base plus the
# private overlay, composed into the global context every harness loads. A work
# mac joining the fleet belongs in its own group and overrides
# `agent_compose_sources` to the public base alone, never the private overlay.

# Third-party taps (core/cask omitted). Each entry is {name, url?}. Private
# Forgejo taps carry an explicit url - the bare name resolves to
# github.com/<user>/homebrew-<repo>, which does not exist for them. Public
# taps omit url. The coilysiren/* org migrated to coilyco-flight-deck/*;
# coily has not moved yet, agent-guard was renamed to ward (now its own tap).
homebrew_taps:
  - name: coilyco-flight-deck/otel-a2a-relay-cli
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/otel-a2a-relay-cli
  - name: coilyco-flight-deck/repo-recall
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/repo-recall
  - name: coilyco-flight-deck/session-lattice
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/session-lattice
  - name: coilyco-flight-deck/ward
    url: https://forgejo.coilysiren.me/coilyco-flight-deck/ward
  - name: coilysiren/coily
    url: https://forgejo.coilysiren.me/coilysiren/coily
  - name: getsentry/tools
  - name: homebrew/services
  - name: openhue/cli
  - name: steipete/tap

