# Host-freshen play, roles run in listed order (fleet-orgs first, always tag, so
# the org list resolves before any role walks it). See docs/ansible.md.
- name: Freshen host
  hosts: mac
  gather_facts: true
  become: false
  roles:
    - role: fleet-orgs
      tags: [fleet-orgs, always]
    - role: homebrew
      tags: [homebrew, tooling]
    - role: default-apps
      tags: [default-apps, tooling]
    - role: agent-compose
      tags: [agent-compose]
    - role: codex-permissions
      tags: [codex-permissions]
    - role: claude-hooks
      tags: [claude-hooks, hooks]
    - role: repos
      tags: [repos]
    - role: reconcile
      tags: [reconcile]
    - role: agents-pointer
      tags: [agents-pointer]
    - role: git
      tags: [git]
    - role: lockdown
      tags: [lockdown]
    - role: precommit-hooks
      tags: [precommit-hooks, hooks]
    - role: repo-data
      tags: [repo-data]
    - role: deptree
      tags: [deptree]
