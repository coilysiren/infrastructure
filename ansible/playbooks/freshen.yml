# Host-freshen play: run homebrew, agent-compose, repos, git in order, each
# tagged to run alone. Port of up-to-date.py; detail in docs/ansible.md.
- name: Freshen host
  hosts: mac
  gather_facts: true
  become: false
  roles:
    - role: homebrew
      tags: [homebrew, tooling]
    - role: agent-compose
      tags: [agent-compose]
    - role: repos
      tags: [repos]
    - role: git
      tags: [git]
