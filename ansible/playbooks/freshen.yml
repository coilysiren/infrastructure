# Host-freshen play: homebrew, agent-compose, claude-hooks, repos, reconcile,
# git, deptree in order, each tagged to run alone. Detail in docs/ansible.md.
- name: Freshen host
  hosts: mac
  gather_facts: true
  become: false
  roles:
    - role: homebrew
      tags: [homebrew, tooling]
    - role: agent-compose
      tags: [agent-compose]
    - role: claude-hooks
      tags: [claude-hooks, hooks]
    - role: repos
      tags: [repos]
    - role: reconcile
      tags: [reconcile]
    - role: git
      tags: [git]
    - role: deptree
      tags: [deptree]
