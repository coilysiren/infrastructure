# Classify the control host into the mac/linux group by OS so one inventory is
# correct on any machine, then load the per-OS group_vars. See docs/ansible.md.
- name: Classify host by OS
  hosts: all
  gather_facts: true
  become: false
  tasks:
    - name: Add host to its OS group (mac | linux)
      ansible.builtin.group_by:
        key: "{{ 'mac' if ansible_system == 'Darwin' else 'linux' }}"
      changed_when: false

# Host-freshen play, roles run in listed order (fleet-orgs first, always tag, so
# the org list resolves before any role walks it). See docs/ansible.md.
- name: Freshen host
  hosts: all
  gather_facts: false
  become: false
  roles:
    - role: fleet-orgs
      tags: [fleet-orgs, always]
    - role: shell
      tags: [shell]
    - role: homebrew
      tags: [homebrew, tooling]
    - role: default-apps
      tags: [default-apps, tooling]
    - role: agent-compose
      tags: [agent-compose]
    - role: codex-permissions
      tags: [codex-permissions]
    - role: claude-hooks
      tags: [claude-hooks, hooks]
    - role: kai-config
      tags: [kai-config]
    - role: repos
      tags: [repos]
    - role: reconcile
      tags: [reconcile]
    - role: skills
      tags: [skills]
    - role: agents-pointer
      tags: [agents-pointer]
    - role: git
      tags: [git]
    - role: lockdown
      tags: [lockdown]
    - role: precommit-hooks
      tags: [precommit-hooks, hooks]
    - role: repo-data
      tags: [repo-data]
    - role: deptree
      tags: [deptree]
