# Host-freshen play, roles run in the listed order, each tagged to run alone.
# See docs/ansible.md for the per-role walkthrough.
- name: Freshen host
  hosts: mac
  gather_facts: true
  become: false
  roles:
    - role: homebrew
      tags: [homebrew, tooling]
    - role: default-apps
      tags: [default-apps, tooling]
    - role: agent-compose
      tags: [agent-compose]
    - role: codex-permissions
      tags: [codex-permissions]
    - role: claude-hooks
      tags: [claude-hooks, hooks]
    - role: repos
      tags: [repos]
    - role: reconcile
      tags: [reconcile]
    - role: agents-pointer
      tags: [agents-pointer]
    - role: git
      tags: [git]
    - role: deptree
      tags: [deptree]
