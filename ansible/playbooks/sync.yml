# Classify the control host into the mac/linux group by OS so one inventory is
- name: Classify host by OS
  hosts: all
  gather_facts: true
  become: false
  tasks:
    - name: Add host to its OS group (mac | linux)
      ansible.builtin.group_by:
        key: "{{ 'mac' if ansible_system == 'Darwin' else 'linux' }}"
      changed_when: false
      tags: [always]

- name: Freshen host
  hosts: all
  gather_facts: false
  become: false
  roles:
    - role: fleet-orgs
      tags: [fleet-orgs, always]
    - role: shell
      tags: [shell]
    - role: homebrew
      tags: [homebrew, tooling]
    - role: ollama
      tags: [ollama, tooling]
    - role: mac-proxy
      tags: [mac-proxy, tooling]
    - role: default-apps
      tags: [default-apps, tooling]
    - role: lan-hosts
      tags: [lan-hosts, hosts]
    - role: agent-compose
      tags: [agent-compose]
    - role: codex-permissions
      tags: [codex-permissions]
    - role: claude-hooks
      tags: [claude-hooks, hooks]
    - role: kai-config
      tags: [kai-config]
    - role: repos
      tags: [repos]
    - role: reconcile
      tags: [reconcile]
    - role: skills
      tags: [skills]
    - role: agents-pointer
      tags: [agents-pointer]
    - role: git
      tags: [git]
    - role: lockdown
      tags: [lockdown]
    - role: precommit-hooks
      tags: [precommit-hooks, hooks]
    - role: repo-data
      tags: [repo-data]
    - role: deptree
      tags: [deptree]

  post_tasks:
    - name: Fail the sync run on repos needing manual action
      ansible.builtin.fail:
        msg: >-
          Host is not fresh: {{ repo_sweep.action_required | length }} repo(s)
          need manual action - {{ repo_sweep.action_required | join(', ') }}.
          See the git-role report above for the per-repo flags.
      when:
        - repo_sweep is defined
        - repo_sweep.action_required | length > 0
      tags: [git, always]
