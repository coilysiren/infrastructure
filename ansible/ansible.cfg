# Repo-local Ansible config. Discovered via ANSIBLE_CONFIG (set by the
# coily verbs / Make targets) so ansible-playbook can run from the repo root
# while keeping inventory + roles paths relative to this dir.
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
host_key_checking = False
interpreter_python = auto_silent
nocows = True
# yaml-formatted task results via the builtin default callback (the old
# community.general.yaml stdout callback was removed in v12).
result_format = yaml
retry_files_enabled = False

[ssh_connection]
pipelining = True
