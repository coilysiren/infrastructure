# NodePort sibling so host-userspace on kai-server reaches vmsingle via localhost:30428,
# bypassing the broken on-host tailnet loopback. See §7 of docs/k3s-deploy-notes.md.
apiVersion: v1
kind: Service
metadata:
  name: vmsingle-nodeport
  namespace: observability
  labels:
    app: vmsingle-nodeport
spec:
  type: NodePort
  selector:
    app: server
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/name: victoria-metrics-single
  ports:
    - name: http
      port: 8428
      targetPort: http
      nodePort: 30428
      protocol: TCP
