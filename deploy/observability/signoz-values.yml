# Helm values for signoz/signoz (pinned in scripts/k8s/signoz.py): self-hosted OTel

clickhouse:
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: kai-server
  clickhouseOperator:
    nodeSelector:
      kubernetes.io/hostname: kai-server
  persistence:
    enabled: true
    storageClass: local-path  # k3s default; lands on the NVMe.
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
  zookeeper:
    enabled: true
    replicaCount: 1
    nodeSelector:
      kubernetes.io/hostname: kai-server
    persistence:
      enabled: true
      storageClass: local-path
      accessModes:
        - ReadWriteOnce
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

signoz:
  nodeSelector:
    kubernetes.io/hostname: kai-server
  service:
    type: ClusterIP
    port: 8080
  persistence:
    enabled: true
    storageClass: local-path
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  env:
    signoz_analytics_enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

otelCollector:
  nodeSelector:
    kubernetes.io/hostname: kai-server
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

telemetryStoreMigrator:
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: kai-server
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
