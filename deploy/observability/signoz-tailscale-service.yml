# Tailnet HTTPS exposure of the SigNoz UI via a standalone ts-signoz proxy Deployment
# (helm-managed pod, no sidecar). Authkey from SSM. See docs/tailscale.md.
---
apiVersion: v1
kind: Service
metadata:
  name: signoz-tailscale
  namespace: observability
  labels:
    app: signoz-tailscale
spec:
  # In-cluster routing target for the ts-signoz serve proxy. Selects the
  # helm-managed signoz app pod.
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: signoz
    app.kubernetes.io/name: signoz
    app.kubernetes.io/component: signoz
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-signoz
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ts-signoz-state
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-signoz-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ts-signoz-state
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ts-signoz-state
subjects:
  - kind: ServiceAccount
    name: ts-signoz
    namespace: observability
---
# Serve config for the ts sidecar HTTPS termination; containerboot expands
# ${TS_CERT_DOMAIN} at start. Proxies to signoz-tailscale. See docs/tailscale.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: signoz-ts-serve
  namespace: observability
data:
  serve-config.json: |
    {
      "TCP": { "443": { "HTTPS": true } },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": { "/": { "Proxy": "http://signoz-tailscale.observability.svc.cluster.local:80" } }
        }
      }
    }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-signoz-authkey
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-signoz-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/signoz/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-signoz
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ts-signoz
  template:
    metadata:
      labels:
        app: ts-signoz
    spec:
      serviceAccountName: ts-signoz
      # Pin to kai-server for /dev/net/tun, same as ntfy and vmsingle.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: signoz
            - name: TS_KUBE_SECRET
              value: ts-signoz-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            # Terminate HTTPS on :443 and reverse-proxy to signoz; containerboot
            # substitutes ${TS_CERT_DOMAIN} at startup. See docs/tailscale.md.
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve/serve-config.json
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-signoz-authkey
                  key: authkey
          volumeMounts:
            - name: ts-serve
              mountPath: /etc/ts-serve
              readOnly: true
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ts-serve
          configMap:
            name: signoz-ts-serve
