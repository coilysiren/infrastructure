# Tailnet exposure of the SigNoz UI over HTTPS.
#
# Same TS_SERVE_CONFIG HTTPS-termination pattern as deploy/ntfy.yml, with
# one adaptation: ntfy runs the ts container as an in-pod sidecar and
# proxies to 127.0.0.1, but SigNoz's pod is helm-managed and not ours to
# add a sidecar to. So ts-signoz stays a standalone proxy Deployment and
# its serve config proxies to the in-cluster signoz-tailscale Service
# instead of localhost.
#
# The ts sidecar terminates HTTPS on :443 - TS_SERVE_CONFIG (the
# signoz-ts-serve ConfigMap) makes it provision a Let's Encrypt cert for
# signoz.<tailnet>.ts.net and reverse-proxy to the SigNoz app. Reach the
# UI at https://signoz.<tailnet>.ts.net.
#
# HTTPS is not cosmetic: on plain HTTP browsers degrade password-manager
# autofill, so HTTPS is what makes the SigNoz login a silent one-click
# autofill instead of a typed password. No public Ingress, no cert-
# manager, no Route 53 - the cert is tailnet-internal, issued via the
# tailnet's HTTPS feature.
#
# The .ts.net suffix is unavoidable: a TLS cert can only be issued for
# the device's full MagicDNS name, not the bare `signoz` short name.
#
# The ts authkey is minted by terraform/tailscale/ (service
# `signoz` in services.yaml) and landed in SSM at
# /coilysiren/signoz/ts-authkey.
#
# Apply: sudo k3s kubectl apply -f deploy/observability/signoz-tailscale-service.yml
---
apiVersion: v1
kind: Service
metadata:
  name: signoz-tailscale
  namespace: observability
  labels:
    app: signoz-tailscale
spec:
  # In-cluster routing target for the ts-signoz serve proxy. Selects the
  # helm-managed signoz app pod.
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: signoz
    app.kubernetes.io/name: signoz
    app.kubernetes.io/component: signoz
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-signoz
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ts-signoz-state
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-signoz-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ts-signoz-state
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ts-signoz-state
subjects:
  - kind: ServiceAccount
    name: ts-signoz
    namespace: observability
---
# Serve config for the tailscale sidecar's HTTPS termination. The
# ${TS_CERT_DOMAIN} placeholder is expanded by containerboot to the
# device's MagicDNS FQDN at container start, so the opaque tailnet
# suffix is never written into this repo. Proxies to the signoz-tailscale
# Service, which fronts the helm-managed signoz app pod on :8080.
apiVersion: v1
kind: ConfigMap
metadata:
  name: signoz-ts-serve
  namespace: observability
data:
  serve-config.json: |
    {
      "TCP": { "443": { "HTTPS": true } },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": { "/": { "Proxy": "http://signoz-tailscale.observability.svc.cluster.local:80" } }
        }
      }
    }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-signoz-authkey
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-signoz-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/signoz/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-signoz
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ts-signoz
  template:
    metadata:
      labels:
        app: ts-signoz
    spec:
      serviceAccountName: ts-signoz
      # Pin to kai-server for /dev/net/tun, same as ntfy and vmsingle.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: signoz
            - name: TS_KUBE_SECRET
              value: ts-signoz-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            # Terminate HTTPS on :443 and reverse-proxy to the signoz app.
            # containerboot substitutes ${TS_CERT_DOMAIN} in the file at
            # startup. Replaces the old TS_DEST_IP L3-forward mode.
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve/serve-config.json
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-signoz-authkey
                  key: authkey
          volumeMounts:
            - name: ts-serve
              mountPath: /etc/ts-serve
              readOnly: true
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ts-serve
          configMap:
            name: signoz-ts-serve
