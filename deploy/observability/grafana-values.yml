# Helm values for the grafana-community/grafana chart (the old grafana/helm-charts

nodeSelector:
  kubernetes.io/hostname: kai-server

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

initChownData:
  enabled: false

securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

grafana.ini:
  auth.anonymous:
    enabled: false
  security:
    disable_initial_admin_creation: false
    cookie_secure: true
    cookie_samesite: strict
  server:
    root_url: https://grafana.coilysiren.me
  analytics:
    reporting_enabled: false
    check_for_updates: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://victoria-metrics-victoria-metrics-single-server.observability.svc:8428
        isDefault: true
        jsonData:
          timeInterval: 30s
          prometheusType: Prometheus

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: VictoriaMetrics

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
  hosts:
    - grafana.coilysiren.me
  tls:
    - hosts:
        - grafana.coilysiren.me
      secretName: grafana-tls

service:
  type: ClusterIP

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
