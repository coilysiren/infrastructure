# Helm values for the grafana-community/grafana chart.
# https://github.com/grafana-community/helm-charts/tree/main/charts/grafana
#
# Note: the original `grafana/helm-charts` repo deprecated this chart on
# 2026-01-30 and pointed users at `grafana-community/helm-charts`. Same
# maintainers, same values schema. Repo URL: https://grafana-community.github.io/helm-charts
#
# Public at https://grafana.coilysiren.me, login required (anon disabled).
# VM datasource pre-provisioned; "Node Exporter Full" dashboard auto-loaded.

# Pin to kai-server alongside the rest of the stack.
nodeSelector:
  kubernetes.io/hostname: kai-server

# Persistence for the SQLite db (dashboards, users, API keys).
persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

# The chart's init-chown-data container chowns /var/lib/grafana to user 472.
# It's no longer required when the pod's fsGroup is set (kubelet handles
# ownership at mount time). Leaving it on with the chart-12.x defaults
# results in chown running as non-root and hitting Permission denied on
# subdirs like /png /csv /pdf that grafana created at runtime.
initChownData:
  enabled: false

# Match the chart's default group so kubelet's fsGroup ownership step lines
# up with the grafana process's gid. Pre-existing PVC files were already
# created with this gid by the 10.5.x chart, so this is a no-op for ours.
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# Admin user/password come from the `grafana-admin` k8s Secret, which
# external-secrets syncs from SSM /grafana/admin-password. See
# admin-password-externalsecret.yml in this directory.
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

# Anonymous viewer OFF. Public visitors land on the login page.
# When ready to expose specific dashboards publicly, flip this to true and
# set viewers_can_edit=false / scope via folder permissions, not globally.
grafana.ini:
  auth.anonymous:
    enabled: false
  security:
    # Disable user sign-up; only admin-created accounts.
    disable_initial_admin_creation: false
    cookie_secure: true
    cookie_samesite: strict
  server:
    root_url: https://grafana.coilysiren.me
  analytics:
    reporting_enabled: false
    check_for_updates: false

# Pre-provisioned datasource pointing at vmsingle's HTTP API in-cluster.
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        # Service name follows the chart's default: <release>-victoria-metrics-single-server
        url: http://victoria-metrics-victoria-metrics-single-server.observability.svc:8428
        isDefault: true
        jsonData:
          timeInterval: 30s
          # VM is Prometheus-API-compatible; this hint helps Grafana pick the
          # right query syntax.
          prometheusType: Prometheus

# Auto-import the "Node Exporter Full" dashboard (1860) on first boot.
# Sourced from grafana.com; chart pulls JSON at install time.
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: VictoriaMetrics
    eco-telemetry:
      # Inline JSON so it lives in version control alongside this values file.
      # Loaded by the dashboardProvider on each Grafana restart.
      json: |
        {
          "title": "Eco - server health",
          "uid": "eco-telemetry",
          "schemaVersion": 39,
          "timezone": "browser",
          "refresh": "30s",
          "time": {"from": "now-6h", "to": "now"},
          "tags": ["eco", "eco-telemetry"],
          "panels": [
            {
              "type": "stat",
              "title": "Players online",
              "id": 1,
              "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
              "targets": [
                {"expr": "eco_players_online", "legendFormat": "{{service_name}}", "refId": "A"}
              ],
              "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}
            },
            {
              "type": "timeseries",
              "title": "Players online (history)",
              "id": 2,
              "gridPos": {"x": 6, "y": 0, "w": 18, "h": 4},
              "targets": [
                {"expr": "eco_players_online", "legendFormat": "{{service_name}}", "refId": "A"}
              ]
            },
            {
              "type": "timeseries",
              "title": ".NET GC heap size",
              "id": 3,
              "gridPos": {"x": 0, "y": 4, "w": 12, "h": 6},
              "targets": [
                {"expr": "process_runtime_dotnet_gc_heap_size_bytes", "legendFormat": "gen {{generation}}", "refId": "A"}
              ],
              "fieldConfig": {"defaults": {"unit": "bytes"}}
            },
            {
              "type": "timeseries",
              "title": ".NET GC collections (rate)",
              "id": 4,
              "gridPos": {"x": 12, "y": 4, "w": 12, "h": 6},
              "targets": [
                {"expr": "rate(process_runtime_dotnet_gc_collections_count_total[5m])", "legendFormat": "gen {{generation}}", "refId": "A"}
              ],
              "fieldConfig": {"defaults": {"unit": "ops"}}
            },
            {
              "type": "timeseries",
              "title": ".NET exceptions thrown (rate)",
              "id": 5,
              "gridPos": {"x": 0, "y": 10, "w": 12, "h": 6},
              "targets": [
                {"expr": "rate(process_runtime_dotnet_exceptions_count_total[5m])", "legendFormat": "exceptions/s", "refId": "A"}
              ],
              "fieldConfig": {"defaults": {"unit": "ops"}}
            },
            {
              "type": "timeseries",
              "title": ".NET threadpool threads",
              "id": 6,
              "gridPos": {"x": 12, "y": 10, "w": 12, "h": 6},
              "targets": [
                {"expr": "process_runtime_dotnet_thread_pool_threads_count", "legendFormat": "{{state}}", "refId": "A"}
              ]
            }
          ]
        }

# Public ingress on grafana.coilysiren.me, traefik + cert-manager DNS-01.
# Mirrors the canonical shape from infrastructure/docs/k3s-deploy-notes.md §5.
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    kubernetes.io/tls-acme: "true"
  hosts:
    - grafana.coilysiren.me
  tls:
    - hosts:
        - grafana.coilysiren.me
      secretName: grafana-tls

# No tailnet exposure for the UI; it's already on the public ingress and
# logging in over WAN is fine.
service:
  type: ClusterIP

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
