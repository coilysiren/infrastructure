# Static tailnet exposure of vmsingle. Replaces the operator-managed
# ts-proxy with a standalone ts-vmsingle Deployment that runs only the
# tailscale container with TS_DEST_IP pointed at the Service ClusterIP.
#
# vmsingle's primary Service is headless (clusterIP: None) because the
# helm chart wires it as the StatefulSet's pod-DNS service. So we keep
# this side-car ClusterIP Service that selects the same pod, plus a
# port: 80 entry so tailnet peers can hit `http://vmsingle` without a
# port suffix.
#
# Pattern: standalone ts-proxy Deployment, distinct from the in-pod
# sidecar repo-recall uses. Used for any workload whose Pod template
# isn't ours to modify (helm-managed StatefulSets, third-party
# operators, etc.). The repo-recall canary uses the in-pod sidecar
# pattern; see deploy/repo-recall.yml.
#
# Apply alongside the helm chart:
#   sudo k3s kubectl apply -f deploy/observability/vmsingle-tailscale-service.yml
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle-tailscale
  namespace: observability
  labels:
    app: vmsingle-tailscale
spec:
  # Pinned to the existing allocation so TS_DEST_IP below stays stable
  # across recreates. Service ClusterIP is immutable post-creation; if
  # this ever needs to change, delete + recreate the Service and update
  # both the IP here and TS_DEST_IP in the Deployment in lockstep.
  clusterIP: 10.43.140.169
  type: ClusterIP
  selector:
    app: server
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/name: victoria-metrics-single
  ports:
    # Short-URL port. Tailnet peers hit `http://vmsingle` -> ts proxy
    # forwards to Service :80 -> targetPort 8428 on the helm StatefulSet.
    - name: http
      port: 80
      targetPort: 8428
      protocol: TCP
    # Native vmsingle port, for tools that still address it explicitly.
    - name: metrics
      port: 8428
      targetPort: 8428
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-vmsingle
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ts-vmsingle-state
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-vmsingle-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ts-vmsingle-state
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ts-vmsingle-state
subjects:
  - kind: ServiceAccount
    name: ts-vmsingle
    namespace: observability
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-vmsingle-authkey
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-vmsingle-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/vmsingle/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-vmsingle
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ts-vmsingle
  template:
    metadata:
      labels:
        app: ts-vmsingle
    spec:
      serviceAccountName: ts-vmsingle
      # Pin to kai-server for /dev/net/tun, same as repo-recall.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: vmsingle
            - name: TS_KUBE_SECRET
              value: ts-vmsingle-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            # Standalone-proxy mode. containerboot forwards inbound
            # tailnet traffic to this IP at the same destination port,
            # so tailnet :80 lands at vmsingle-tailscale :80 which the
            # Service translates to targetPort 8428 on the helm pod.
            - name: TS_DEST_IP
              value: "10.43.140.169"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-vmsingle-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
