# Static tailnet exposure of vmsingle via a standalone ts-vmsingle Deployment plus a
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle-tailscale
  namespace: observability
  labels:
    app: vmsingle-tailscale
spec:
  clusterIP: 10.43.140.169
  type: ClusterIP
  selector:
    app: server
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/name: victoria-metrics-single
  ports:
    - name: http
      port: 80
      targetPort: 8428
      protocol: TCP
    - name: metrics
      port: 8428
      targetPort: 8428
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-vmsingle
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ts-vmsingle-state
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-vmsingle-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ts-vmsingle-state
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ts-vmsingle-state
subjects:
  - kind: ServiceAccount
    name: ts-vmsingle
    namespace: observability
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-vmsingle-authkey
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-vmsingle-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/vmsingle/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-vmsingle
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ts-vmsingle
  template:
    metadata:
      labels:
        app: ts-vmsingle
    spec:
      serviceAccountName: ts-vmsingle
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: vmsingle
            - name: TS_KUBE_SECRET
              value: ts-vmsingle-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_DEST_IP
              value: "10.43.140.169"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-vmsingle-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
