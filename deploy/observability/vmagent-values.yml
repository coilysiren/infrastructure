# Helm values for victoria-metrics-agent: scrapes node-exporter :9100, remote-writes

nodeSelector:
  kubernetes.io/hostname: kai-server

remoteWrite:
  - url: http://victoria-metrics-victoria-metrics-single-server.observability.svc:8428/api/v1/write

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  global:
    scrape_interval: 30s
  scrape_configs:
    - job_name: node-exporter
      kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names: [observability]
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
          regex: prometheus-node-exporter
          action: keep
        - source_labels: [__meta_kubernetes_endpoint_node_name]
          target_label: instance
        - action: labeldrop
          regex: (pod|namespace|service|container)
