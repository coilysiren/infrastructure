# Sync the Grafana admin password from AWS SSM into a Kubernetes Secret.
# The grafana chart reads admin user/password from `grafana-admin` (referenced
# in grafana-values.yml as admin.existingSecret).
#
# To rotate: update /grafana/admin-password in SSM and wait for the next
# refresh (1h) or kubectl annotate the ExternalSecret to force-sync:
#   kubectl annotate externalsecret -n observability grafana-admin \
#     force-sync=$(date +%s) --overwrite
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        admin-user: admin
        admin-password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: /grafana/admin-password
