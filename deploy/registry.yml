# In-cluster OCI registry for homelab deploys. Replaces the GitHub-Actions
# "docker save | tailscale ssh | ctr import" path: GitHub no longer joins
# the tailnet for any repo. The Forgejo runner (kai-desktop-tower-wsl node)
# builds an image and pushes here; kai-server's containerd pulls from here.
#
# Reachability model (no DNS, no TLS, no GitHub):
#   * Service is NodePort 30500 -> registry pod :5000.
#   * Both the runner's DinD and kai-server's containerd address the
#     registry at the kai-server LAN IP 192.168.0.194:30500 (RFC1918,
#     stable, already in the k3s API cert SANs - safe to hardcode per
#     the SSM opaque-vs-meaningful bright line).
#   * Insecure (plain http). containerd is told to treat it as insecure
#     via /etc/rancher/k3s/registries.yaml on kai-server (see the runbook
#     in docs/k3s-deploy-notes.md §11). The runner's DinD is told via
#     --insecure-registry in deploy/forgejo-runner.yml.
#
# Image ref scheme baked into each repo's deploy manifest:
#   192.168.0.194:30500/<name-dashed>:<git-sha>
#
# Apply: sudo k3s kubectl apply -f deploy/registry.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      # Layer blobs for a handful of small services. local-path lands on
      # kai-server's NVMe; bump if image churn outgrows it.
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  strategy:
    # RWO PVC: the old pod must release the volume before the new one
    # mounts it. Recreate avoids the two-pods-one-volume deadlock.
    type: Recreate
  template:
    metadata:
      labels:
        app: registry
    spec:
      # Co-locate with the puller (kai-server) so a pull never crosses the
      # node boundary, and so the PVC's local-path volume binds here.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: registry
          image: registry:2
          env:
            - name: REGISTRY_HTTP_ADDR
              value: ":5000"
            # Allow blob deletion so a future GC/prune job can reclaim space.
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          ports:
            - name: registry
              containerPort: 5000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
