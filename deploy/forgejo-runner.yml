# Forgejo Actions runners on kai-server k3s: StatefulSet with per-pod DinD.
# Unpinned - schedules on any Ready node. Details: docs/k3s-deploy-notes.md §7.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: forgejo-runner-secrets
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: forgejo-runner-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: /forgejo/api-token
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runner
  namespace: forgejo
spec:
  # One pod = one concurrent job. Bump to scale.
  replicas: 2
  serviceName: forgejo-runner
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        # Mints a per-pod registration token via the admin API and writes the
        # .runner state file; skips if already registered (restarts mustn't re-register).
        - name: register
          image: data.forgejo.org/forgejo/runner:12
          env:
            - name: FORGEJO_INSTANCE_URL
              value: http://forgejo.forgejo.svc.cluster.local
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secrets
                  key: api-token
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              cd /data
              if [ -f .runner ]; then
                echo "already registered, skipping"
                exit 0
              fi
              # Forgejo admin API: mint an instance-level registration token.
              TOKEN=$(wget -qO- \
                --header="Authorization: token ${API_TOKEN}" \
                "${FORGEJO_INSTANCE_URL}/api/v1/admin/runners/registration-token" \
                | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
              if [ -z "${TOKEN}" ]; then
                echo "failed to mint registration token" >&2
                exit 1
              fi
              forgejo-runner register \
                --no-interactive \
                --instance "${FORGEJO_INSTANCE_URL}" \
                --token "${TOKEN}" \
                --name "${HOSTNAME}"
          volumeMounts:
            - name: data
              mountPath: /data
          workingDir: /data
      containers:
        - name: runner
          image: data.forgejo.org/forgejo/runner:12
          command: ["forgejo-runner", "daemon"]
          env:
            # dind sidecar listens on tcp 2375 when TLS_CERTDIR="".
            # Same pod = localhost works.
            - name: DOCKER_HOST
              value: tcp://localhost:2375
          workingDir: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
        # Per-pod dockerd. Privileged because dind needs it. Talks to
        # the runner over the pod's loopback at tcp 2375, TLS off.
        - name: dind
          image: docker:28-dind
          securityContext:
            privileged: true
          # --insecure-registry: the in-cluster registry (deploy/registry.yml)
          # serves plain http, so dockerd needs it allowlisted to push.
          args:
            - "--insecure-registry=192.168.0.194:30500"
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: docker-lib
              mountPath: /var/lib/docker
      volumes:
        - name: docker-lib
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
