# lunch-money namespace + API-token ExternalSecret, synced from SSM into the
# `lunch-money-token` Secret the Helm chart consumes. See docs/k3s-deploy-notes.md.
---
apiVersion: v1
kind: Namespace
metadata:
  name: lunch-money
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lunch-money-token
  namespace: lunch-money
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: lunch-money-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: /coilysiren/lunchmoney/api-token
