# lunch-money namespace + API-token ExternalSecret.
#
# The token lives in SSM at /coilysiren/lunchmoney/api-token (SecureString).
# external-secrets materializes it into the `lunch-money-token` Secret, which
# the Helm chart consumes via lunchMoney.existingSecret.
#
# Apply:  sudo k3s kubectl apply -f deploy/lunch-money/secret.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: lunch-money
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lunch-money-token
  namespace: lunch-money
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: lunch-money-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: /coilysiren/lunchmoney/api-token
