# Public front door for the Tangled knot (host systemd service on :5555) via
---
apiVersion: v1
kind: Namespace
metadata:
  name: tangled
---
apiVersion: v1
kind: Service
metadata:
  name: tangled-knot
  namespace: tangled
spec:
  ports:
    - name: http
      port: 5555
      targetPort: 5555
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: tangled-knot
  namespace: tangled
subsets:
  - addresses:
      - ip: 192.168.0.194
    ports:
      - name: http
        port: 5555
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tangled-knot
  namespace: tangled
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - tangled.coilysiren.me
      secretName: tangled-knot-tls
  rules:
    - host: tangled.coilysiren.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tangled-knot
                port:
                  number: 5555
