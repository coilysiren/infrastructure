# repo-recall on kai-server k3s: three-container Pod (api/web/ts), tailnet-only,
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-recall
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: repo-recall
  namespace: repo-recall
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["repo-recall-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: repo-recall-ts-state
subjects:
  - kind: ServiceAccount
    name: repo-recall
    namespace: repo-recall
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: repo-recall
  template:
    metadata:
      labels:
        app: repo-recall
    spec:
      serviceAccountName: repo-recall
      nodeSelector:
        kubernetes.io/hostname: kai-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/coilysiren/repo-recall-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 7777
          env:
            - name: REPO_RECALL_HOST
              value: "0.0.0.0"
            - name: REPO_RECALL_PORT
              value: "7777"
            - name: REPO_RECALL_MCP_ORIGINS
              value: "http://repo-recall,http://repo-recall.tail09a41b.ts.net,https://repo-recall.tail09a41b.ts.net"
            - name: REPO_RECALL_CWD
              value: "/workspace/projects/coilysiren"
            - name: HOME
              value: "/workspace/home"
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-recall-gh-token
                  key: token
          volumeMounts:
            - name: projects
              mountPath: /workspace/projects/coilysiren
              readOnly: true
            - name: claude
              mountPath: /workspace/home/.claude
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: web
          image: ghcr.io/coilysiren/repo-recall-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: API_UPSTREAM
              value: "localhost:7777"
          securityContext:
            capabilities:
              add: ["NET_BIND_SERVICE"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: repo-recall
            - name: TS_KUBE_SECRET
              value: repo-recall-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: repo-recall-ts-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: projects
          hostPath:
            path: /home/kai/projects/coilysiren
            type: Directory
        - name: claude
          hostPath:
            path: /home/kai/.claude
            type: Directory
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-gh-token
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-gh-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .ghToken }}"
  data:
    - secretKey: ghToken
      remoteRef:
        key: /coilysiren/repo-recall/gh-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-ts-authkey
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/repo-recall/ts-authkey
---
apiVersion: v1
kind: Service
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  type: ClusterIP
  selector:
    app: repo-recall
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
