# repo-recall on kai-server k3s: three-container Pod (api/web/ts), tailnet-only,
# hostPath read-only, GHCR images. See docs/repo-recall-deploy.md.
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-recall
---
# Dedicated SA + Role + RoleBinding so the ts sidecar can read/write its
# TS_KUBE_SECRET state Secret. See docs/repo-recall-deploy.md.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: repo-recall
  namespace: repo-recall
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["repo-recall-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: repo-recall-ts-state
subjects:
  - kind: ServiceAccount
    name: repo-recall
    namespace: repo-recall
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: repo-recall
  template:
    metadata:
      labels:
        app: repo-recall
    spec:
      serviceAccountName: repo-recall
      # Pin to kai-server: ts sidecar needs /dev/net/tun, unexposed on WSL2.
      # See docs/repo-recall-deploy.md.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/coilysiren/repo-recall-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 7777
          env:
            # 0.0.0.0 so kubelet probes reach :7777 via pod IP. The api stays
            # private; only web's port is fronted. See docs/repo-recall-deploy.md.
            - name: REPO_RECALL_HOST
              value: "0.0.0.0"
            - name: REPO_RECALL_PORT
              value: "7777"
            # MCP CORS allowlist; the MagicDNS name lets a direct tailnet curl
            # against /mcp succeed. See docs/repo-recall-deploy.md.
            - name: REPO_RECALL_MCP_ORIGINS
              value: "http://repo-recall,http://repo-recall.tail09a41b.ts.net,https://repo-recall.tail09a41b.ts.net"
            # Mounted worktree + Claude session JSONL; HOME repointed at the mount
            # root so the ingest glob finds sessions. See docs/repo-recall-deploy.md.
            - name: REPO_RECALL_CWD
              value: "/workspace/projects/coilysiren"
            - name: HOME
              value: "/workspace/home"
            # GH_TOKEN for the octocrab ingest layer, from SSM via the
            # ExternalSecret below. See docs/repo-recall-deploy.md.
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-recall-gh-token
                  key: token
          volumeMounts:
            - name: projects
              mountPath: /workspace/projects/coilysiren
              readOnly: true
            - name: claude
              mountPath: /workspace/home/.claude
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: web
          image: ghcr.io/coilysiren/repo-recall-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            # Port 80 so tailnet peers hit `http://repo-recall` without a :PORT
            # suffix; web binds 80 directly. See docs/repo-recall-deploy.md.
            - name: PORT
              value: "80"
            # Same-Pod sibling. localhost is the Caddyfile default but
            # passing it explicitly keeps the deploy self-documenting.
            - name: API_UPSTREAM
              value: "localhost:7777"
          securityContext:
            # Caddy runs as UID 1000; binding port 80 non-root needs
            # CAP_NET_BIND_SERVICE, scoped to that one capability.
            capabilities:
              add: ["NET_BIND_SERVICE"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
        # tailscale sidecar in kernel mode: Pod gains a tailnet IP, web's
        # listener reachable at `repo-recall`. See docs/repo-recall-deploy.md.
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: repo-recall
            - name: TS_KUBE_SECRET
              value: repo-recall-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            # Keep the pod's resolv.conf; accepting tailnet DNS would break
            # in-pod service discovery for the api/web siblings.
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: repo-recall-ts-authkey
                  key: authkey
          securityContext:
            # privileged + root: tailscaled needs /dev/net/tun and netlink
            # ioctls. The api/web siblings still run as UID 1000.
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: projects
          hostPath:
            path: /home/kai/projects/coilysiren
            type: Directory
        - name: claude
          hostPath:
            path: /home/kai/.claude
            type: Directory
---
# GH_TOKEN for the api container's octocrab ingest, from SSM
# /coilysiren/repo-recall/gh-token.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-gh-token
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-gh-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .ghToken }}"
  data:
    - secretKey: ghToken
      remoteRef:
        key: /coilysiren/repo-recall/gh-token
---
# TS_AUTHKEY for the ts sidecar, from SSM /coilysiren/repo-recall/ts-authkey
# (terraform-provisioned). See docs/repo-recall-deploy.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-ts-authkey
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/repo-recall/ts-authkey
---
# ClusterIP Service for in-cluster routing only; tailnet exposure comes
# from the ts sidecar's WireGuard interface, not a Service annotation.
apiVersion: v1
kind: Service
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  type: ClusterIP
  selector:
    app: repo-recall
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
