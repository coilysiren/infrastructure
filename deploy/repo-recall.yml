# repo-recall on kai-server k3s. Tailnet-only, no Ingress, no Route 53.
#
# Three containers in one Pod: `api` (Rust axum + MCP on :7777), `web`
# (Caddy serving the static SPA on :8080, reverse-proxying /api,
# /openapi.json, /mcp to localhost:7777), and `ts` (tailscale sidecar
# in kernel mode that gives the Pod a tailnet IP, so tailnet peers
# reach `repo-recall.<tailnet>.ts.net:8080` directly).
#
# The ts sidecar replaces the tailscale-operator's per-Service ts-proxy
# StatefulSet. Auth key is minted by terraform/tailscale-devices/ and
# materialized into the namespace via the ExternalSecret below. State
# persists in a k8s Secret (TS_KUBE_SECRET) so pod restarts re-use the
# device identity without re-consuming the single-use auth key.
#
# Filesystem access is via hostPath, read-only. The API container reads the
# host project tree and Claude session JSONL during ingest; it does not
# write either path. Cache (redb + tantivy) goes to $TMPDIR per AGENTS.
# hostPath rather than a local-path PVC because the data we want is already
# at a stable on-host location (the operator-managed worktree); a PVC would
# add a sidecar to populate it from the same path, which is just indirection.
# securityContext UID 1000 must match the host owner of /home/kai/* (kai on
# kai-server is UID 1000). Read-only mounts mean a misbehaving container
# can't corrupt the worktree.
#
# Images come from coilysiren/repo-recall's `docker.yml` workflow:
#   ghcr.io/coilysiren/repo-recall-api:latest
#   ghcr.io/coilysiren/repo-recall-web:latest
# The manifest references `:latest` so a fresh `kubectl apply` (including
# from a third-party operator deploying repo-recall on their own cluster)
# pulls a working image from GHCR. Subsequent rolls on kai-server happen
# via `kubectl set image deploy/repo-recall <container>=ghcr.io/coilysiren
# /repo-recall-<api|web>:sha-<short>` from the docker.yml `ship` job,
# which sideloads SHA-pinned images directly into kai-server's containerd
# via tailscale ssh + `k3s ctr import`. imagePullPolicy: IfNotPresent so
# the kubelet prefers the sideloaded image.
#
# Apply: sudo k3s kubectl apply -f deploy/repo-recall.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-recall
---
# Dedicated ServiceAccount + Role + RoleBinding so the ts sidecar can
# read/write its TS_KUBE_SECRET state Secret (repo-recall-ts-state).
# Scoped tight: only this Secret name, only get/update/patch (+ create
# for initial seed). Mirrors the operator's `proxies` ServiceAccount
# pattern, but namespaced to repo-recall rather than living in the
# global tailscale namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: repo-recall
  namespace: repo-recall
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["repo-recall-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: repo-recall-ts-state
  namespace: repo-recall
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: repo-recall-ts-state
subjects:
  - kind: ServiceAccount
    name: repo-recall
    namespace: repo-recall
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: repo-recall
  template:
    metadata:
      labels:
        app: repo-recall
    spec:
      serviceAccountName: repo-recall
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/coilysiren/repo-recall-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 7777
          env:
            # 0.0.0.0 so the kubelet readiness/liveness probes reach
            # :7777 via the pod IP. The api stays private: only the web
            # container's :8080 is fronted externally, and the tailnet
            # ACL doesn't open :7777. Caddy reverse-proxies to
            # localhost:7777 in-pod, which works either way.
            - name: REPO_RECALL_HOST
              value: "0.0.0.0"
            - name: REPO_RECALL_PORT
              value: "7777"
            # MCP CORS allowlist. The Caddy sidecar terminates the tailnet
            # request on the SPA origin; same-Pod localhost upstream means
            # MCP only ever sees a same-origin call. Listing the public
            # MagicDNS name here lets a direct curl from a tailnet peer
            # against /mcp succeed too.
            - name: REPO_RECALL_MCP_ORIGINS
              value: "http://repo-recall,http://repo-recall.tail09a41b.ts.net,https://repo-recall.tail09a41b.ts.net"
            # Mounted worktree + Claude session JSONL. HOME is repointed at
            # the mount root so the standard `~/.claude/projects/*.jsonl`
            # glob in the ingest layer finds the sessions without code changes.
            - name: REPO_RECALL_CWD
              value: "/workspace/projects/coilysiren"
            - name: HOME
              value: "/workspace/home"
            # GitHub token for the octocrab ingest layer. Sourced from
            # SSM /coilysiren/repo-recall/gh-token via the external-
            # secrets operator (see ExternalSecret below). repo-recall's
            # OctocrabClient reads GH_TOKEN ahead of `gh auth token`,
            # so this env var alone is sufficient - no need to seed a
            # gh CLI config in the image.
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-recall-gh-token
                  key: token
          volumeMounts:
            - name: projects
              mountPath: /workspace/projects/coilysiren
              readOnly: true
            - name: claude
              mountPath: /workspace/home/.claude
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: web
          image: ghcr.io/coilysiren/repo-recall-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # Same-Pod sibling. localhost is the Caddyfile default but
            # passing it explicitly keeps the deploy self-documenting.
            - name: API_UPSTREAM
              value: "localhost:7777"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
        # tailscale sidecar in kernel mode. Pod gains a tailnet IP via
        # WireGuard userspace + a real TUN device (privileged: true is
        # what the previous operator-managed ts-proxy StatefulSets use
        # on this same WSL2 kernel, so it's the known-working shape).
        # Once `tailscale up` runs, web's 0.0.0.0:8080 listener is
        # reachable from tailnet peers at `repo-recall:8080`. No
        # explicit forwarding rule needed - same pod netns means the
        # tailnet IP and the pod IP both terminate at the web container.
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: repo-recall
            - name: TS_KUBE_SECRET
              value: repo-recall-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            # Don't override the pod's resolv.conf; the cluster has its
            # own DNS path and accepting tailnet DNS would break in-pod
            # service discovery for the api/web siblings.
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: repo-recall-ts-authkey
                  key: authkey
          securityContext:
            # privileged needed for /dev/net/tun on the WSL2 kernel.
            # The pod-level runAsNonRoot is overridden here because
            # tailscaled needs root for the netlink + tun ioctls; the
            # api/web siblings still run as UID 1000.
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: projects
          hostPath:
            path: /home/kai/projects/coilysiren
            type: Directory
        - name: claude
          hostPath:
            path: /home/kai/.claude
            type: Directory
---
# GH_TOKEN for the api container's octocrab ingest. Sourced from
# SSM /coilysiren/repo-recall/gh-token.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-gh-token
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-gh-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .ghToken }}"
  data:
    - secretKey: ghToken
      remoteRef:
        key: /coilysiren/repo-recall/gh-token
---
# TS_AUTHKEY for the ts sidecar. Sourced from
# SSM /coilysiren/repo-recall/ts-authkey, which terraform/tailscale-
# devices/ provisions. Single-use, 90-day expiry; the ts sidecar's
# TS_KUBE_SECRET state Secret holds the persisted device identity
# after first boot so subsequent pod restarts don't need a fresh key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-ts-authkey
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/repo-recall/ts-authkey
---
# ClusterIP Service for in-cluster routing only. Tailnet exposure
# comes from the ts sidecar's WireGuard interface, not from any
# Service annotation. The previous tailscale.com/expose annotations
# are gone with the operator deprovision.
apiVersion: v1
kind: Service
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  type: ClusterIP
  selector:
    app: repo-recall
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
