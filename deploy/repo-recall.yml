# repo-recall on kai-server k3s. Tailnet-only, no Ingress, no Route 53.
#
# Two containers in one Pod: `api` (Rust axum + MCP on :7777) and `web`
# (Caddy serving the static SPA on :8080, reverse-proxying /api, /openapi.json,
# /mcp to localhost:7777). Mirrors forgejo's tailscale-operator pattern - the
# Service carries `tailscale.com/expose: "true"` + `tailscale.com/hostname:
# repo-recall` so the operator stands up a ts-proxy at the MagicDNS name
# `repo-recall.<tailnet>.ts.net`.
#
# Filesystem access is via hostPath, read-only. The API container reads the
# host project tree and Claude session JSONL during ingest; it does not
# write either path. Cache (redb + tantivy) goes to $TMPDIR per AGENTS.
# hostPath rather than a local-path PVC because the data we want is already
# at a stable on-host location (the operator-managed worktree); a PVC would
# add a sidecar to populate it from the same path, which is just indirection.
# securityContext UID 1000 must match the host owner of /home/kai/* (kai on
# kai-server is UID 1000). Read-only mounts mean a misbehaving container
# can't corrupt the worktree.
#
# Images come from coilysiren/repo-recall's `docker.yml` workflow:
#   ghcr.io/coilysiren/repo-recall-api:latest
#   ghcr.io/coilysiren/repo-recall-web:latest
# The manifest references `:latest` so a fresh `kubectl apply` (including
# from a third-party operator deploying repo-recall on their own cluster)
# pulls a working image from GHCR. Subsequent rolls on kai-server happen
# via `kubectl set image deploy/repo-recall <container>=coilysiren/repo-
# recall-<api|web>:<sha>` from the docker.yml `ship` job, which sideloads
# SHA-pinned images directly into kai-server's containerd via tailscale
# ssh + `k3s ctr import`. imagePullPolicy: IfNotPresent so the kubelet
# uses the sideloaded image rather than trying to pull a local-only ref.
#
# Apply: sudo k3s kubectl apply -f deploy/repo-recall.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: repo-recall
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-recall
  namespace: repo-recall
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: repo-recall
  template:
    metadata:
      labels:
        app: repo-recall
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ghcr.io/coilysiren/repo-recall-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 7777
          env:
            # 0.0.0.0 so the kubelet readiness/liveness probes reach
            # :7777 via the pod IP. The api stays private: only the web
            # container's :8080 is fronted by the Service, and the
            # pod network namespace is not shared. Caddy reverse-proxies
            # to localhost:7777 in-pod, which works either way.
            - name: REPO_RECALL_HOST
              value: "0.0.0.0"
            - name: REPO_RECALL_PORT
              value: "7777"
            # MCP CORS allowlist. The Caddy sidecar terminates the tailnet
            # request on the SPA origin; same-Pod localhost upstream means
            # MCP only ever sees a same-origin call. Listing the public
            # MagicDNS name here lets a direct curl from a tailnet peer
            # against /mcp succeed too.
            - name: REPO_RECALL_MCP_ORIGINS
              value: "http://repo-recall,http://repo-recall.tail09a41b.ts.net,https://repo-recall.tail09a41b.ts.net"
            # Mounted worktree + Claude session JSONL. HOME is repointed at
            # the mount root so the standard `~/.claude/projects/*.jsonl`
            # glob in the ingest layer finds the sessions without code changes.
            - name: REPO_RECALL_CWD
              value: "/workspace/projects/coilysiren"
            - name: HOME
              value: "/workspace/home"
            # GitHub token for the octocrab ingest layer. Sourced from
            # SSM /coilysiren/repo-recall/gh-token via the external-
            # secrets operator (see ExternalSecret below). repo-recall's
            # OctocrabClient reads GH_TOKEN ahead of `gh auth token`,
            # so this env var alone is sufficient - no need to seed a
            # gh CLI config in the image.
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-recall-gh-token
                  key: token
          volumeMounts:
            - name: projects
              mountPath: /workspace/projects/coilysiren
              readOnly: true
            - name: claude
              mountPath: /workspace/home/.claude
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/scan-version
              port: 7777
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: web
          image: ghcr.io/coilysiren/repo-recall-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # Same-Pod sibling. localhost is the Caddyfile default but
            # passing it explicitly keeps the deploy self-documenting.
            - name: API_UPSTREAM
              value: "localhost:7777"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: projects
          hostPath:
            path: /home/kai/projects/coilysiren
            type: Directory
        - name: claude
          hostPath:
            path: /home/kai/.claude
            type: Directory
---
# tailnet-exposed front door. The tailscale operator picks up the
# annotations and stands up a ts-proxy StatefulSet with the pinned MagicDNS
# hostname `repo-recall.<tailnet>.ts.net`. Only the web container is
# exposed; /api, /openapi.json, /mcp reach the API container via the
# in-Pod localhost reverse_proxy in deploy/Caddyfile.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-recall-gh-token
  namespace: repo-recall
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: repo-recall-gh-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        token: "{{ .ghToken }}"
  data:
    - secretKey: ghToken
      remoteRef:
        key: /coilysiren/repo-recall/gh-token
---
apiVersion: v1
kind: Service
metadata:
  name: repo-recall
  namespace: repo-recall
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: repo-recall
spec:
  type: ClusterIP
  selector:
    app: repo-recall
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
