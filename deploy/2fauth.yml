# 2FAuth (self-hosted TOTP manager) on kai-server k3s. Tailnet-only in-pod
---
apiVersion: v1
kind: Namespace
metadata:
  name: 2fauth
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: 2fauth
  namespace: 2fauth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: 2fauth-ts-state
  namespace: 2fauth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["2fauth-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: 2fauth-ts-state
  namespace: 2fauth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: 2fauth-ts-state
subjects:
  - kind: ServiceAccount
    name: 2fauth
    namespace: 2fauth
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: 2fauth-data
  namespace: 2fauth
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 2fauth
  namespace: 2fauth
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: 2fauth
  template:
    metadata:
      labels:
        app: 2fauth
    spec:
      serviceAccountName: 2fauth
      nodeSelector:
        kubernetes.io/hostname: kai-server
      securityContext:
        fsGroup: 1000
      containers:
        - name: app
          image: 2fauth/2fauth:6.1.3
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: APP_URL
              value: http://2fauth:8000
            - name: DB_CONNECTION
              value: sqlite
            - name: DB_DATABASE
              value: /2fauth/database.sqlite
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: 2fauth-app-key
                  key: app-key
          volumeMounts:
            - name: data
              mountPath: /2fauth
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: 2fauth
            - name: TS_KUBE_SECRET
              value: 2fauth-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: 2fauth-ts-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: 2fauth-data
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: 2fauth-app-key
  namespace: 2fauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: 2fauth-app-key
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        app-key: "{{ .appKey }}"
  data:
    - secretKey: appKey
      remoteRef:
        key: /coilysiren/2fauth/app-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: 2fauth-ts-authkey
  namespace: 2fauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: 2fauth-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/2fauth/ts-authkey
---
apiVersion: v1
kind: Service
metadata:
  name: 2fauth
  namespace: 2fauth
spec:
  type: ClusterIP
  selector:
    app: 2fauth
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
