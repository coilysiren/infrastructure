# ntfy (self-hosted push notification server) on kai-server k3s. Tailnet-only.
#
# In-pod tailscale sidecar pattern (2fauth.yml / repo-recall.yml). The
# sidecar gives the Pod a tailnet IP and terminates HTTPS: TS_SERVE_
# CONFIG (the ntfy-ts-serve ConfigMap) makes it provision a Let's
# Encrypt cert for ntfy.<tailnet>.ts.net and proxy :443 to the ntfy app
# on 127.0.0.1:80. Reach the server at https://ntfy.<tailnet>.ts.net.
#
# HTTPS is required, not cosmetic: ntfy's web app gates browser
# notifications behind a secure context, and the iOS app refuses
# plain-HTTP servers. No public Ingress, no cert-manager, no Route 53 -
# the cert is tailnet-internal, issued via the tailnet's HTTPS feature.
#
# The .ts.net suffix is unavoidable: a TLS cert can only be issued for
# the device's full MagicDNS name, not the bare `ntfy` short name.
#
# Access model: the tailnet is the boundary. AUTH_DEFAULT_ACCESS is
# read-write, so any tailnet peer (and any host script) can publish and
# subscribe to any topic without a per-user login. That is the point -
# "scripts ping my phone" should not need credential plumbing. An
# auth.db still exists on the PVC, so users/ACLs can be layered later
# (`ntfy user add`, then flip AUTH_DEFAULT_ACCESS to deny-all) without
# a manifest change beyond that one env var.
#
# Web Push stays off: it needs VAPID keys. Attachments are on - they
# need an explicit base-url, sourced from SSM (the ntfy-base-url
# ExternalSecret) so the opaque tailnet suffix never lands in the repo.
#
# The ts authkey is minted by terraform/tailscale-devices/ (service
# `ntfy` in services.yaml) and landed in SSM at
# /coilysiren/ntfy/ts-authkey. ntfy itself needs no app secret - the
# cache and auth DBs are created at runtime on the PVC.
#
# Apply: sudo k3s kubectl apply -f deploy/ntfy.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: ntfy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ntfy
  namespace: ntfy
---
# Lets the ts sidecar persist its device identity in the TS_KUBE_SECRET
# state Secret. Scoped to that one Secret name, same shape as 2fauth.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ntfy-ts-state
  namespace: ntfy
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ntfy-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ntfy-ts-state
  namespace: ntfy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ntfy-ts-state
subjects:
  - kind: ServiceAccount
    name: ntfy
    namespace: ntfy
---
# Serve config for the tailscale sidecar's HTTPS termination. The
# ${TS_CERT_DOMAIN} placeholder is expanded by containerboot to the
# device's MagicDNS FQDN at container start, so the opaque tailnet
# suffix is never written into this repo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-ts-serve
  namespace: ntfy
data:
  serve-config.json: |
    {
      "TCP": { "443": { "HTTPS": true } },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": { "/": { "Proxy": "http://127.0.0.1:80" } }
        }
      }
    }
---
# Message cache (SQLite), auth DB, and attachment cache. local-path is
# the k3s built-in single-node provisioner. Attachment total is capped
# at 2G below, so 5Gi leaves headroom for cache + auth + attachments.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: ntfy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      serviceAccountName: ntfy
      # Pin to kai-server: the ts sidecar needs /dev/net/tun, and
      # local-path pins the volume to one node anyway.
      nodeSelector:
        kubernetes.io/hostname: kai-server
      securityContext:
        fsGroup: 1000
      containers:
        - name: app
          image: binwiederhier/ntfy:v2.23.0
          # Image entrypoint is `ntfy`; `serve` starts the server.
          args: ["serve"]
          ports:
            - name: http
              containerPort: 80
          env:
            # Behind the tailscale sidecar's HTTPS proxy: trust the
            # X-Forwarded-* headers for visitor IP and rate limiting.
            - name: NTFY_BEHIND_PROXY
              value: "true"
            # External URL - needed for attachment links and shown in
            # the web UI. Carries the opaque tailnet suffix, so it is
            # sourced from SSM /coilysiren/ntfy/base-url via the
            # ntfy-base-url ExternalSecret, never hardcoded here.
            - name: NTFY_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ntfy-base-url
                  key: base-url
            # ntfy listens plain HTTP on :80; the sidecar fronts it with
            # TLS. The image runs as root, so the privileged :80 bind
            # needs no capability. :80 is also ntfy's default.
            - name: NTFY_LISTEN_HTTP
              value: ":80"
            - name: NTFY_CACHE_FILE
              value: /var/lib/ntfy/cache.db
            # Message retention in the cache. 12h is the ntfy default.
            - name: NTFY_CACHE_DURATION
              value: "12h"
            - name: NTFY_AUTH_FILE
              value: /var/lib/ntfy/auth.db
            # Tailnet is the boundary - see the header note. Flip to
            # deny-all once per-user ACLs are wanted.
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: read-write
            # Attachments land on the PVC. Total capped at 2G; the PVC
            # is 5Gi. NTFY_BASE_URL above is required for attachments.
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: /var/lib/ntfy/attachments
            - name: NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT
              value: "2G"
            - name: NTFY_LOG_LEVEL
              value: info
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
        # tailscale sidecar in kernel mode. Pod gains a tailnet IP, and
        # TS_SERVE_CONFIG makes it terminate HTTPS on :443 (cert auto-
        # provisioned for ntfy.<tailnet>.ts.net) and proxy to the ntfy
        # app on 127.0.0.1:80, which it shares a network namespace with.
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: ntfy
            - name: TS_KUBE_SECRET
              value: ntfy-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ntfy-ts-authkey
                  key: authkey
            # Terminate HTTPS on :443, proxy to ntfy :80. containerboot
            # substitutes ${TS_CERT_DOMAIN} in the file at startup.
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve/serve-config.json
          volumeMounts:
            - name: ts-serve
              mountPath: /etc/ts-serve
              readOnly: true
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
        - name: ts-serve
          configMap:
            name: ntfy-ts-serve
---
# TS_AUTHKEY for the ts sidecar. Sourced from SSM
# /coilysiren/ntfy/ts-authkey, minted by terraform/tailscale-devices/.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-ts-authkey
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ntfy-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/ntfy/ts-authkey
---
# ntfy's external base URL. Carries the opaque tailnet suffix, so it
# lives in SSM /coilysiren/ntfy/base-url (a String param) rather than
# hardcoded here. Required for attachments.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-base-url
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ntfy-base-url
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        base-url: "{{ .baseUrl }}"
  data:
    - secretKey: baseUrl
      remoteRef:
        key: /coilysiren/ntfy/base-url
---
# ClusterIP for in-cluster routing only. Tailnet exposure is the ts
# sidecar's WireGuard interface, not a Service annotation.
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: ntfy
spec:
  type: ClusterIP
  selector:
    app: ntfy
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
