# ntfy (self-hosted push) on kai-server k3s. Tailnet-only via in-pod tailscale
---
apiVersion: v1
kind: Namespace
metadata:
  name: ntfy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ntfy
  namespace: ntfy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ntfy-ts-state
  namespace: ntfy
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ntfy-ts-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ntfy-ts-state
  namespace: ntfy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ntfy-ts-state
subjects:
  - kind: ServiceAccount
    name: ntfy
    namespace: ntfy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-ts-serve
  namespace: ntfy
data:
  serve-config.json: |
    {
      "TCP": { "443": { "HTTPS": true } },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": { "/": { "Proxy": "http://127.0.0.1:80" } }
        }
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: ntfy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      serviceAccountName: ntfy
      nodeSelector:
        kubernetes.io/hostname: kai-server
      securityContext:
        fsGroup: 1000
      containers:
        - name: app
          image: binwiederhier/ntfy:v2.23.0
          args: ["serve"]
          ports:
            - name: http
              containerPort: 80
          env:
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: ntfy-base-url
                  key: base-url
            - name: NTFY_LISTEN_HTTP
              value: ":80"
            - name: NTFY_CACHE_FILE
              value: /var/lib/ntfy/cache.db
            - name: NTFY_CACHE_DURATION
              value: "12h"
            - name: NTFY_AUTH_FILE
              value: /var/lib/ntfy/auth.db
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: read-write
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: /var/lib/ntfy/attachments
            - name: NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT
              value: "2G"
            - name: NTFY_LOG_LEVEL
              value: info
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: ntfy
            - name: TS_KUBE_SECRET
              value: ntfy-ts-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ntfy-ts-authkey
                  key: authkey
            - name: TS_SERVE_CONFIG
              value: /etc/ts-serve/serve-config.json
          volumeMounts:
            - name: ts-serve
              mountPath: /etc/ts-serve
              readOnly: true
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
        - name: ts-serve
          configMap:
            name: ntfy-ts-serve
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-ts-authkey
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ntfy-ts-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/ntfy/ts-authkey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-base-url
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ntfy-base-url
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        base-url: "{{ .baseUrl }}"
  data:
    - secretKey: baseUrl
      remoteRef:
        key: /coilysiren/ntfy/base-url
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: ntfy
spec:
  type: ClusterIP
  selector:
    app: ntfy
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
