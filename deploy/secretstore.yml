apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store
  namespace: external-secrets
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: aws_access_key_id
          secretAccessKeySecretRef:
            name: aws-credentials
            key: aws_secret_access_key
---
# Cluster-scoped mirror of the above, so app namespaces (coilysiren-backend,
# coilysiren-eco-mcp-app, coilysiren-galaxy-gen, etc.) can reference
# `kind: ClusterSecretStore` / `name: aws-parameter-store` without each
# having to define its own SecretStore + bootstrap its own aws-credentials
# Secret. The `namespace: external-secrets` on the secretRefs pins the
# auth lookup at the single hand-placed `external-secrets/aws-credentials`
# Secret regardless of which namespace the consuming ExternalSecret lives
# in — that's required for ClusterSecretStore, which otherwise defaults to
# the consuming namespace and breaks every app deploy (SecretSyncedError:
# `aws-credentials` not found).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: aws_access_key_id
            namespace: external-secrets
          secretAccessKeySecretRef:
            name: aws-credentials
            key: aws_secret_access_key
            namespace: external-secrets
