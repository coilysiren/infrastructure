# Forgejo (self-hosted git) on kai-server k3s.
#
# Phase 2 of the rollout in docs/forgejo-deploy-plan.md: public at
# https://forgejo.coilysiren.me/. The tailnet ts-proxy front door stays
# in place; the Ingress block at the bottom adds the public path via
# Traefik + cert-manager DNS-01. Hardening folded in for the public
# surface: image on the 15.0.2 security release, /metrics gated by a
# bearer token, Traefik rate-limit + HSTS middlewares, account emails
# private by default. See the security review on the phase-2 issue.
#
# Apply: sudo k3s kubectl apply -f deploy/forgejo.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: forgejo
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: forgejo-secrets
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: forgejo-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: /forgejo/secret-key
    - secretKey: internal-token
      remoteRef:
        key: /forgejo/internal-token
    - secretKey: lfs-jwt-secret
      remoteRef:
        key: /forgejo/lfs-jwt-secret
    - secretKey: db-password
      remoteRef:
        key: /forgejo/db-password
    - secretKey: metrics-token
      remoteRef:
        key: /forgejo/metrics-token
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-db-data
  namespace: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
# Headless Service for the Postgres StatefulSet's pod-DNS.
apiVersion: v1
kind: Service
metadata:
  name: forgejo-db
  namespace: forgejo
  labels:
    app: forgejo-db
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: forgejo-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-db
  namespace: forgejo
spec:
  replicas: 1
  serviceName: forgejo-db
  selector:
    matchLabels:
      app: forgejo-db
  template:
    metadata:
      labels:
        app: forgejo-db
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: forgejo
            - name: POSTGRES_USER
              value: forgejo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: forgejo-db-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - forgejo
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - forgejo
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: forgejo-db-data
          persistentVolumeClaim:
            claimName: forgejo-db-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      hostAliases:
        # Pin *.coilysiren.me back to the homelab LAN IP so any
        # in-pod call back into the cluster (webhooks, mirrors)
        # doesn't egress to the public internet. See
        # docs/k3s-deploy-notes.md §10.
        - ip: 192.168.0.194
          hostnames:
            - eco.coilysiren.me
            - forgejo.coilysiren.me
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15.0.2-rootless
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: FORGEJO__security__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: secret-key
            - name: FORGEJO__security__INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: internal-token
            - name: FORGEJO__server__LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: lfs-jwt-secret
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: db-password
            # INSTALL_LOCK skips the web installer and is also required
            # for the `forgejo admin user create` CLI to run (otherwise
            # MustInstalled() fails with "Unable to load config file for
            # an installed Forgejo instance"). Env-driven config makes
            # the web installer redundant.
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            - name: FORGEJO__database__HOST
              value: forgejo-db:5432
            - name: FORGEJO__database__NAME
              value: forgejo
            - name: FORGEJO__database__USER
              value: forgejo
            - name: FORGEJO__database__SSL_MODE
              value: disable
            - name: FORGEJO__server__DOMAIN
              value: forgejo.coilysiren.me
            - name: FORGEJO__server__ROOT_URL
              value: https://forgejo.coilysiren.me/
            - name: FORGEJO__server__HTTP_PORT
              value: "3000"
            - name: FORGEJO__server__DISABLE_SSH
              value: "true"
            - name: FORGEJO__server__LFS_START_SERVER
              value: "true"
            # COOKIE_SECURE left at the default `auto`. ROOT_URL is
            # https, the public Ingress terminates TLS, so session
            # cookies come back Secure-only as they should. The phase-1
            # COOKIE_SECURE=false override was removed at phase 2.
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "true"
            # Account emails hidden on public profiles by default.
            - name: FORGEJO__service__DEFAULT_KEEP_EMAIL_PRIVATE
              value: "true"
            - name: FORGEJO__metrics__ENABLED
              value: "true"
            # /metrics is reachable on the public Ingress; gate it with a
            # bearer token so repo/user counts aren't world-readable.
            # Nothing in-cluster scrapes it yet, so the token costs no
            # scraper wiring. Callers send `Authorization: Bearer <token>`.
            - name: FORGEJO__metrics__TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-secrets
                  key: metrics-token
            - name: FORGEJO__mailer__ENABLED
              value: "false"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1500Mi
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            # Rootless first-boot does a recursive chown on the PVC.
            # 60s buys it room before liveness starts killing.
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: forgejo-data
              mountPath: /var/lib/gitea
      volumes:
        - name: forgejo-data
          persistentVolumeClaim:
            claimName: forgejo-data
---
# tailnet-exposed front door. Standalone ts-proxy Deployment pattern
# (same shape as vmsingle in deploy/observability/vmsingle-tailscale-
# service.yml). The forgejo container is rootless and opinionated
# about :3000, so the in-pod sidecar pattern that repo-recall and the
# eco-* services use doesn't fit cleanly here. The Service does the
# port 80 -> 3000 translation; the ts proxy forwards inbound tailnet
# traffic to TS_DEST_IP which is this Service's ClusterIP.
apiVersion: v1
kind: Service
metadata:
  name: forgejo
  namespace: forgejo
spec:
  # Pinned to the existing allocation so TS_DEST_IP below stays stable
  # across recreates. ClusterIP is immutable post-create; future
  # changes need delete+recreate of the Service plus the TS_DEST_IP
  # below in lockstep.
  clusterIP: 10.43.221.226
  type: ClusterIP
  selector:
    app: forgejo
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ts-forgejo
  namespace: forgejo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ts-forgejo-state
  namespace: forgejo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ts-forgejo-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ts-forgejo-state
  namespace: forgejo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ts-forgejo-state
subjects:
  - kind: ServiceAccount
    name: ts-forgejo
    namespace: forgejo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ts-forgejo-authkey
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ts-forgejo-authkey
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        authkey: "{{ .authkey }}"
  data:
    - secretKey: authkey
      remoteRef:
        key: /coilysiren/forgejo/ts-authkey
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-forgejo
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ts-forgejo
  template:
    metadata:
      labels:
        app: ts-forgejo
    spec:
      serviceAccountName: ts-forgejo
      nodeSelector:
        kubernetes.io/hostname: kai-server
      containers:
        - name: ts
          image: tailscale/tailscale:v1.78.1
          env:
            - name: TS_HOSTNAME
              value: forgejo
            - name: TS_KUBE_SECRET
              value: ts-forgejo-state
            - name: TS_USERSPACE
              value: "false"
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
            # Standalone-proxy mode. containerboot forwards inbound
            # tailnet traffic to this IP at the same destination port,
            # so tailnet :80 lands at forgejo Service :80 which the
            # Service translates to targetPort 3000 on the workload pod.
            - name: TS_DEST_IP
              value: "10.43.221.226"
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: ts-forgejo-authkey
                  key: authkey
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
# Phase-2 public path. Traefik v3 CRDs (traefik.io/v1alpha1, the group
# k3s ships). Middlewares are referenced from the Ingress below via the
# traefik.io/router.middlewares annotation, name-formatted as
# <namespace>-<middleware>@kubernetescrd.
#
# Rate limit: moderate per-source-IP cap. Generous enough for the web UI
# (many asset requests) and git-over-HTTP, tight enough to blunt crude
# floods and credential-stuffing bursts. Determined slow brute force is
# bounded separately by admin-invite-only accounts.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forgejo-ratelimit
  namespace: forgejo
spec:
  rateLimit:
    average: 50
    burst: 100
    period: 1s
---
# HSTS. cert-manager gives TLS, not the Strict-Transport-Security header.
# includeSubdomains stays false on purpose: *.coilysiren.me has sibling
# subdomains (api, eco) that should not inherit this policy. No preload.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forgejo-hsts
  namespace: forgejo
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: false
    stsPreload: false
    forceSTSHeader: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.io/router.middlewares: forgejo-forgejo-ratelimit@kubernetescrd,forgejo-forgejo-hsts@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - forgejo.coilysiren.me
      secretName: forgejo-tls
  rules:
    - host: forgejo.coilysiren.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: forgejo
                port:
                  number: 80
