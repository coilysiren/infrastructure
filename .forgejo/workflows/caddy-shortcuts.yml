name: caddy-shortcuts

# Daily regen of caddy/sites/*.caddy from siblings' coily.yaml tailnet.shortcut decls.
# Design in coilyco-flight-deck/infrastructure#129; kai-server reload is still manual.

# Reads siblings via the Forgejo API; the auto-injected GITHUB_TOKEN is a Forgejo token
# giving rate-limit headroom and read access, and is reused for the commit-back push.

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC daily, staggered from common cron alignment
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync

      - name: install yq
        run: |
          curl -sSfL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      - name: regenerate snippets
        # No FORGEJO_TOKEN: GITHUB_TOKEN is repo-scoped, so the script reads sibling
        # coily.yaml anonymously (public only). Private siblings need a broader token.
        run: |
          uv run python scripts/generate-caddy-shortcuts.py

      - name: commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet caddy/sites/; then
            echo "no shortcut changes"
            exit 0
          fi
          git config user.email "actions@forgejo.coilysiren.me"
          git config user.name "forgejo-actions"
          git add caddy/sites/
          git commit -m "caddy: regenerate tailnet shortcut snippets, refs #129"
          git push origin HEAD:main
