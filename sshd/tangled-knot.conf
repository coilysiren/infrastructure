# Tangled knot: route the git user's SSH auth through the knot, so git
# push over SSH is gated by atproto-registered keys. Installed to
# /etc/ssh/sshd_config.d/tangled-knot.conf. From the upstream NixOS
# knot module. SSH stays tailnet-only - this only adds the git user.
# See infrastructure#280.
Match User git
    AuthorizedKeysCommand /etc/ssh/tangled-knot-keyfetch
    AuthorizedKeysCommandUser nobody
    PasswordAuthentication no
    KbdInteractiveAuthentication no
