# Per-repo command allowlist for infrastructure. Loaded by pkg/repocfg when
# coily is invoked inside this checkout.
#
# Scope: dev verbs that run locally against the cluster via kubectl, helm,
# and terraform, plus the llama deploy bootstrap. Systemd-unit ops live in
# coily core (coily ssh systemctl, coily gaming eco / coily gaming
# core-keeper / coily gaming icarus). The *-pre.sh / *-start.sh scripts
# are invoked by systemd on kai-server and aren't runnable from a
# workstation, so they stay out.
#
# Each verb below delegates to a Make target.

commands:
  k3s-list-dns:
    run: make k3s-list-dns
    description: Spin up a diagnostic ubuntu pod and dump every Service DNS record.
  cert-manager:
    run: make cert-manager
    description: Install or refresh cert-manager + ClusterIssuers (deploy/cert_manager.yml).
  aws-secrets:
    run: make aws-secrets
    description: Bootstrap external-secrets + aws-credentials. Args - aws_access_key_id=ID aws_secret_access_key=SECRET.
  observability:
    run: make observability
    description: Install or upgrade the VictoriaMetrics + Grafana stack.
  observability-admin-password:
    run: make observability-admin-password
    description: Print the auto-generated Grafana admin password.
  terraform-grafana:
    run: make terraform-grafana
    description: Run terraform against terraform/grafana/ (GRAFANA_AUTH wired from SSM). Args - action=plan|apply|init|destroy.
  terraform-admin-kms:
    run: make terraform-admin-kms
    description: Run terraform against terraform/admin-kms/ (admin-only KMS key for SSM-wrapping). Args - action=plan|apply|init|destroy.
  terraform-tailscale-oidc:
    run: make terraform-tailscale-oidc
    description: Run terraform against terraform/tailscale-oidc/ (TS admin OAuth wired from SSM). Args - action=plan|apply|init|destroy.
  terraform-tailscale-devices:
    run: make terraform-tailscale-devices
    description: Run terraform against terraform/tailscale-devices/ (one tailscale_tailnet_key per k8s sidecar service; replaces tailscale-operator). Args - action=plan|apply|init|destroy.
  sync-tailscale-oidc-secrets:
    run: make sync-tailscale-oidc-secrets
    description: Push TS_CLIENT_ID + TS_AUDIENCE to each repo via gh CLI live auth, reading from tf outputs.
  llama-deploy:
    run: make llama-deploy
    description: Apply llama/deploy.yml into the llama namespace.
  llama-deploy-secrets:
    run: make llama-deploy-secrets
    description: Bootstrap the llama ghcr.io docker-registry secret from SSM /github/pat.
  aws-inventory:
    run: make aws-inventory
    description: Regenerate aws-inventory.yaml from live SSM, S3, and Route53 state.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: configuration
  system: ops
  owner: kai
  lifecycle: production
  description: "k3s cluster, systemd units, and invoke tasks that run kai-server, the host behind personal apps and sites."
  dependsOn: []
  providesApis:
    - k3s-cluster
    - systemd-units
