# Per-repo command allowlist for infrastructure, loaded by pkg/repocfg in this checkout.
# Local kubectl/helm/terraform dev verbs (via Make). systemd ops live in coily core.

commands:
  k3s-list-dns:
    run: make k3s-list-dns
    description: Spin up a diagnostic ubuntu pod and dump every Service DNS record.
  setup-git-lfs:
    run: make setup-git-lfs
    description: Wire Git LFS for the current user and re-smudge degraded LFS checkouts.
  cert-manager:
    run: make cert-manager
    description: Install or refresh cert-manager + ClusterIssuers (deploy/cert_manager.yml).
  aws-secrets:
    run: make aws-secrets
    description: Bootstrap external-secrets + aws-credentials. Args - aws_access_key_id=ID aws_secret_access_key=SECRET.
  observability:
    run: make observability
    description: Install or upgrade the VictoriaMetrics + Grafana stack.
  observability-admin-password:
    run: make observability-admin-password
    description: Print the auto-generated Grafana admin password.
  signoz:
    run: make signoz
    description: Install or upgrade the SigNoz traces stack (private, tailnet-only).
  terraform-grafana:
    run: make terraform-grafana
    description: Run terraform against terraform/grafana/ (GRAFANA_AUTH wired from SSM). Args - action=plan|apply|init|destroy.
  terraform-admin-kms:
    run: make terraform-admin-kms
    description: Run terraform against terraform/admin-kms/ (admin-only KMS key for SSM-wrapping). Args - action=plan|apply|init|destroy.
  terraform-tailscale-merge:
    run: make terraform-tailscale-merge
    description: One-shot merge of tailscale-{policy,oidc,devices} into terraform/tailscale/. Args - action=prepare|push|orphan.
  terraform-tailscale:
    run: make terraform-tailscale
    description: Run terraform against terraform/tailscale/ (merged tailnet stack). Args - action=plan|apply|init|destroy.
  dump-tailscale-acl:
    run: make dump-tailscale-acl
    description: Dump current tailnet policy via admin OAuth (round-trip target for terraform/tailscale/).
  list-tailscale-devices:
    run: make list-tailscale-devices
    description: List every tailnet device with hostname, user, tags, addresses.
  sync-tailscale-oidc-secrets:
    run: make sync-tailscale-oidc-secrets
    description: Push TS_CLIENT_ID + TS_AUDIENCE to each repo in terraform/tailscale/repos.yaml via gh CLI live auth.
  llama-deploy:
    run: make llama-deploy
    description: Apply llama/deploy.yml into the llama namespace.
  llama-deploy-secrets:
    run: make llama-deploy-secrets
    description: Bootstrap the llama ghcr.io docker-registry secret from SSM /github/pat.
  lunch-money:
    run: make lunch-money
    description: Deploy or upgrade the lunch-money-k8s MCP server (deploy/lunch-money/).
  terraform-aws-inventory:
    run: make terraform-aws-inventory
    description: Run terraform against terraform/aws-inventory/ (managed S3 + Route53, SSM data-source). Args - action=plan|apply|init|destroy|output|import.
  caddy-shortcuts:
    run: make caddy-shortcuts
    description: Regenerate caddy/sites/*.caddy from sibling repos' coily.yaml on Forgejo. Args - dry_run=1 to preview without writing.
  host-watch:
    run: make host-watch
    description: Watch a tailnet host's SSH and capture a host-diag.sh snapshot on each dead->alive recovery. Args - host=<alias>.
  claude-remote-control-install:
    run: make claude-remote-control-install
    description: (Re)install the kai-server remote-control daemon, node-tooling-ensure units, and self-heal settings. Idempotent; recovers a latched daemon. Run on kai-server.
  ansible-freshen:
    run: make ansible-freshen
    description: Freshen this host - homebrew + agent-compose + repo clone + layout reconcile + git remote-sync/mirror-drift sweep + cross-org dep-tree check - via ansible/playbooks/freshen.yml. Args - action=check|apply (default check), tags=<csv> to scope (e.g. tags=git).
  ansible-mac-seed:
    run: make ansible-mac-seed
    description: Seed ansible/group_vars/mac.yml from this machine's live brew leaves/casks/taps.
  agents-pointer-migrate:
    run: make agents-pointer-migrate
    description: One-time rollout - render the managed AGENTS.md pointer block into every managed repo's canonical Forgejo main. Dry run by default; args - execute=1 to act, repo=<name> for one, limit=<n>. Ongoing drift is the agents-pointer pre-commit hook's job.

# ssh-passthrough targets (coilyco-bridge/coily#187 ph2): `coily ssh <alias> -- <args>`.
# Remote coily's lockdown is the boundary. working_dir is a git toplevel for audit scope.
ssh:
  targets:
    kai-server:
      user: kai
      host: kai-server
      working_dir: /home/kai/projects/coilysiren/infrastructure

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilyco-bridge/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: configuration
  system: ops
  owner: kai
  lifecycle: production
  description: "k3s cluster, systemd units, and invoke tasks that run kai-server, the host behind personal apps and sites."
  dependsOn: []
